<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ImmoInvest</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f7f8;
      --color-text-primary: #111111;
      --color-text-secondary: #6b7280;
      --color-text-tertiary: #9ca3af;
      --color-border-secondary: #d1d5db;
      --color-border-tertiary: #e5e7eb;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-mono: 'Courier New', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    input, select, textarea, button { font-family: inherit; }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* Storage polyfill via localStorage */
  </style>
</head>
<body>
<div id="root"></div>
<script>
// Polyfill window.storage via localStorage
window.storage = {
  get: (key) => Promise.resolve(localStorage.getItem(key) ? { value: localStorage.getItem(key) } : null),
  set: (key, val) => { localStorage.setItem(key, val); return Promise.resolve(true); },
  delete: (key) => { localStorage.removeItem(key); return Promise.resolve(true); },
};
</script>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

const APPS_SCRIPT_URL = 'https://immoinvest-proxy.mederic-de-vaux.workers.dev';
const STORAGE_BIENS = 'immo_invest_biens_v3';
const STORAGE_CONTACTS = 'immo_invest_contacts_v3';
const STORAGE_LISTINGS = 'immo_invest_listings_v3';
const FRAIS_NOTAIRE_DEFAULT = 0.08;
const FRAIS_AGENCE_DEFAULT = 0.05;

// Pousse un champ vers la Sheet via le Worker → GAS updateBien
async function syncFieldToSheet(id, field, value) {
  try {
    const v = typeof value === 'object' ? JSON.stringify(value) : String(value);
    await fetch(`${APPS_SCRIPT_URL}?action=updateBien&id=${encodeURIComponent(id)}&field=${encodeURIComponent(field)}&value=${encodeURIComponent(v)}`);
  } catch(e) { console.warn('syncFieldToSheet failed', e); }
}

// Ajoute une interaction dans la Sheet Interactions dédiée
async function pushInteractionToSheet(interaction, bienId, bienTitle) {
  try {
    const p = new URLSearchParams({
      action:    'addInteraction',
      id:        String(interaction.id),
      bienId:    String(bienId),
      bienTitle: bienTitle || '',
      type:      interaction.type || '',
      date:      interaction.date || '',
      auteur:    interaction.auteur || '',
      note:      interaction.note || '',
    });
    await fetch(`${APPS_SCRIPT_URL}?${p.toString()}`);
  } catch(e) { console.warn('pushInteractionToSheet failed', e); }
}

const TYPES_BIEN = [
  { id: "9", label: "Tous" }, { id: "9_5", label: "Immeuble" },
  { id: "9_7", label: "Local commercial" }, { id: "9_1", label: "Appartement" }, { id: "9_2", label: "Maison" },
];
const STATUTS = ["Nouveau", "En étude", "Contacté", "Visité", "Suivi", "À appeler", "Écarté"];
const STATUT_COLORS = {
  "Nouveau":    { bg: "#E6F1FB", text: "#0C447C", border: "#B5D4F4" },
  "En étude":   { bg: "#EEEDFE", text: "#3C3489", border: "#AFA9EC" },
  "Contacté":   { bg: "#FAEEDA", text: "#633806", border: "#FAC775" },
  "Visité":     { bg: "#EAF3DE", text: "#27500A", border: "#C0DD97" },
  "Suivi":      { bg: "#E1F5EE", text: "#085041", border: "#5DCAA5" },
  "À appeler":  { bg: "#FFF7ED", text: "#9A3412", border: "#FDBA74" },
  "Écarté":     { bg: "#FCEBEB", text: "#791F1F", border: "#F7C1C1" },
};
const TYPES_CONTACT = ["Agent immobilier","Agence","Notaire","Chasseur immobilier","Particulier","Marchand de biens","Syndic","Gestionnaire","Promoteur","Autre"];
const INT_TYPES = ["Appel","Email","RDV","Visite","SMS","Note"];

function formatDate(d) {
  if (!d) return '—';
  const s = String(d).slice(0, 10); // "2026-05-17" ou "2026-05-17T..."
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s.split('-').reverse().join('/'); // → "17/05/2026"
  return s;
}

function cleanTitle(t) { return (t||'').replace(/\+/g,' '); }
function joursDepuis(date) {
  if (!date) return null;
  const d = new Date(String(date).slice(0,10));
  if (isNaN(d.getTime())) return null;
  const j = Math.floor((Date.now()-d.getTime())/86400000);
  return j >= 0 ? j : null;
}

function Badge({ statut }) {
  const c = STATUT_COLORS[statut] || STATUT_COLORS["Nouveau"];
  return <span style={{ background: c.bg, color: c.text, border: `0.5px solid ${c.border}`, borderRadius: 5, padding: "2px 7px", fontSize: 11, fontWeight: 500 }}>{statut}</span>;
}
function Avatar({ nom }) {
  const i = nom?.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() || '?';
  return <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#E6F1FB', color: '#0C447C', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 500, flexShrink: 0 }}>{i}</div>;
}
function calcRendement(prix, loyers, fn, fa) {
  if (!prix || !loyers) return null;
  return ((loyers / (prix * (1 + fn) + prix * fa)) * 100).toFixed(1);
}
function calcMensualite(m, t, d) {
  const r = t / 12 / 100, n = d * 12;
  if (r === 0) return m / n;
  return (m * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}
function extractLoyers(desc) {
  if (!desc) return 0;
  const a = desc.match(/loyers?\s*annuels?\s*[:\s]*(\d[\d\s]*)\s*€/i) || desc.match(/(\d[\d\s]+)\s*€\s*\/\s*an/i);
  const m = desc.match(/loyers?\s*mensuel[s]?\s*[:\s]*(\d[\d\s]*)\s*€/i) || desc.match(/(\d[\d\s]+)\s*€\s*\/\s*mois/i) || desc.match(/(\d[\d\s]+)\s*€\s*de\s*loyers?/i);
  if (a) return parseFloat(a[1].replace(/\s/g,''));
  if (m) return parseFloat(m[1].replace(/\s/g,'')) * 12;
  return 0;
}
function extractContactFromDesc(desc) {
  if (!desc) return null;
  const tel = desc.match(/(?:tel|tél|téléphone|contact|appel|nous|moi)?[\s:]*(\+?(?:33|0)[1-9](?:[\s.-]?\d{2}){4})/i);
  const email = desc.match(/[\w.-]+@[\w.-]+\.[a-z]{2,}/i);
  const agence = desc.match(/(?:agence|cabinet|immo(?:bilier)?|notaire)\s+([A-ZÀ-Ú][A-Za-zÀ-ú\s]{2,25})/i);
  if (!tel && !email) return null;
  return { telephone: tel?.[1]?.replace(/[\s.-]/g,'') || '', email: email?.[0] || '', nom: agence?.[1]?.trim() || '' };
}
async function analyseTravauxIA(desc, title) {
  if (!desc) return null;
  const kw = ['travaux','rénov','rafraîch','toiture','électric','plomberie','isolation','ravalement','chauffage','fenêtre','à restaurer','à rénover'];
  if (!kw.some(k => desc.toLowerCase().includes(k))) return null;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:100, messages:[{role:'user',content:`Annonce:"${title}". Desc:"${desc.slice(0,600)}". Liste 5 mots max les travaux. Si aucun précis:"travaux non détaillés". Réponds uniquement la liste.`}]})});
    const d = await res.json(); return d.content?.[0]?.text?.trim() || null;
  } catch { return 'travaux mentionnés'; }
}
function useStorage(key) {
  const [data, setDataState] = useState({});
  const loaded = useRef(false);
  useEffect(() => {
    if (loaded.current) return; loaded.current = true;
    window.storage?.get(key).then(r => { if (r?.value) try { setDataState(JSON.parse(r.value)); } catch {} }).catch(()=>{});
  }, [key]);
  const setData = useCallback((u) => {
    setDataState(prev => { const next = typeof u==='function'?u(prev):u; window.storage?.set(key,JSON.stringify(next)).catch(()=>{}); return next; });
  }, [key]);
  return [data, setData];
}
function parseAds(data, filters, existing) {
  return (data.ads||[]).map(ad => {
    const ex = existing[ad.list_id];
    const price = ad.price?.[0]||0;
    const surfAttr = ad.attributes?.find(a=>a.key==='square');
    const surface = surfAttr ? parseInt(surfAttr.value_label) : parseInt(ad.subject?.match(/(\d+)\s*m/)?.[1])||0;
    const loyers = extractLoyers(ad.body);
    const fn = ex?.fraisNotaire ?? FRAIS_NOTAIRE_DEFAULT;
    const fa = ex?.fraisAgence ?? FRAIS_AGENCE_DEFAULT;
    const rend = calcRendement(price, ex?.loyers??loyers, fn, fa);
    const contactInfo = extractContactFromDesc(ad.body);
    const owner = ad.owner || {};
    return {
      id: ad.list_id, title: ad.subject||'Sans titre', price, surface,
      ownerName: ex?.ownerName ?? (owner.name || owner.store_name || ''),
      ownerPhone: ex?.ownerPhone ?? (owner.phone_number || ''),
      ownerType: ex?.ownerType ?? (owner.type === 'pro' ? 'Professionnel' : owner.type === 'private' ? 'Particulier' : ''),
      loyers: ex?.loyers??loyers, rendement: rend?parseFloat(rend):null,
      ppm2: surface>0?Math.round(price/surface):null,
      cp: ad.location?.zipcode||'', ville: ad.location?.city||'',
      desc: (ad.body||'').replace(/\+/g,' ').slice(0,1000), url: ad.url||'#',
      date: (ad.first_publication_date||ad.index_date||'').slice(0,10), source:'LeBonCoin',
      statut: ex?.statut??'Nouveau', statutDate: ex?.statutDate??new Date().toISOString().slice(0,10),
      notes: ex?.notes??'', contactId: ex?.contactId??null,
      fraisNotaire: fn, fraisAgence: fa,
      creditApport: ex?.creditApport??Math.round(price*0.2),
      creditDuree: ex?.creditDuree??20, creditTaux: ex?.creditTaux??3.8,
      interactions: ex?.interactions??[],
      travaux: ex?.travaux??null, travauxAnalyse: ex?.travauxAnalyse??false,
      contactInfo: ex?.contactInfo??contactInfo,
      isNew: !ex,
    };
  }).filter(a => {
    if (filters.prixMin && a.price<filters.prixMin) return false;
    if (filters.prixMax && a.price>filters.prixMax) return false;
    if (filters.surfaceMin && a.surface<filters.surfaceMin) return false;
    if (filters.rendMin && a.rendement && a.rendement<filters.rendMin) return false;
    return true;
  }).sort((a,b) => (b.rendement||0)-(a.rendement||0));
}

function PctField({ label, value, onChange, prix }) {
  const pct = (value*100).toFixed(1);
  const euros = Math.round(prix * value);
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 0', fontSize:12, borderBottom:'0.5px solid var(--color-border-tertiary)' }}>
      <span style={{ color:'var(--color-text-secondary)', flex:1 }}>{label}</span>
      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
        <div style={{ display:'flex', alignItems:'center', border:'0.5px solid var(--color-border-secondary)', borderRadius:6, overflow:'hidden' }}>
          <input type="number" value={pct} step="0.1" min="0" max="20" onChange={e => onChange(parseFloat(e.target.value||0)/100)} style={{ width:52, fontSize:12, padding:'2px 5px', border:'none', background:'var(--color-background-primary)', color:'var(--color-text-primary)', textAlign:'right' }} />
          <span style={{ fontSize:11, padding:'0 5px', color:'var(--color-text-tertiary)', background:'var(--color-background-secondary)' }}>%</span>
        </div>
        <span style={{ fontSize:11, color:'var(--color-text-secondary)', minWidth:80, textAlign:'right', fontWeight:500 }}>{euros.toLocaleString('fr-FR')} €</span>
      </div>
    </div>
  );
}

function LoyerField({ value, onChange }) {
  const [draft, setDraft] = useState(value||0);
  useEffect(() => { setDraft(value||0); }, [value]);
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 0', fontSize:12, borderBottom:'0.5px solid var(--color-border-tertiary)' }}>
      <span style={{ color:'var(--color-text-secondary)' }}>Loyers annuels (€)</span>
      <div style={{ display:'flex', alignItems:'center', gap:4 }}>
        <input type="number" value={draft} step="1000" min="0" onChange={e => setDraft(parseFloat(e.target.value)||0)} onBlur={() => onChange(draft)} onKeyDown={e => e.key==='Enter' && onChange(draft)} style={{ width:100, fontSize:12, padding:'2px 5px', borderRadius:5, border:'0.5px solid var(--color-border-secondary)', background:'var(--color-background-primary)', color:'var(--color-text-primary)', textAlign:'right' }} />
        <span style={{ fontSize:11, color:'var(--color-text-tertiary)' }}>€/an</span>
      </div>
    </div>
  );
}

function ContactInfoBlock({ bien, contacts, onLink, onAdd }) {
  const info = bien.contactInfo || {};
  const displayName = bien.ownerName || info.nom || '';
  const displayPhone = bien.ownerPhone || info.telephone || '';
  const displayEmail = info.email || '';
  const hasInfo = displayName || displayPhone || displayEmail;
  const match = Object.values(contacts).find(c =>
    (displayPhone && c.telephone?.replace(/\D/g,'') === displayPhone.replace(/\D/g,'')) ||
    (displayEmail && c.email === displayEmail) ||
    (displayName && c.nom?.toLowerCase() === displayName.toLowerCase())
  );
  if (!hasInfo) return <div style={{ fontSize:11, color:'var(--color-text-tertiary)', fontStyle:'italic', marginTop:8 }}>Aucune information de contact détectée.</div>;
  return (
    <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:6 }}>
      <div style={{ fontSize:11, fontWeight:500, color:'var(--color-text-secondary)', textTransform:'uppercase', letterSpacing:'0.04em' }}>Contact détecté</div>
      <div style={{ background:'var(--color-background-secondary)', borderRadius:6, padding:'7px 10px', fontSize:12 }}>
        {displayName && <div style={{ fontWeight:500 }}>{displayName} {bien.ownerType ? <span style={{ fontWeight:400, color:'var(--color-text-secondary)' }}>· {bien.ownerType}</span> : ''}</div>}
        {displayPhone && <div style={{ color:'var(--color-text-secondary)', marginTop:2 }}>📞 {displayPhone}</div>}
        {displayEmail && <div style={{ color:'var(--color-text-secondary)', marginTop:2 }}>✉ {displayEmail}</div>}
      </div>
      {match ? (
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:11, color:'#27500A', background:'#EAF3DE', borderRadius:6, padding:'6px 10px' }}>
          <span>✓ Dans la base : <strong>{match.nom}</strong></span>
          <button onClick={() => onLink(match.id)} style={{ fontSize:11, padding:'2px 8px', borderRadius:5, border:'0.5px solid #C0DD97', background:'#fff', color:'#27500A', cursor:'pointer' }}>Lier</button>
        </div>
      ) : (
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:11, color:'#633806', background:'#FAEEDA', borderRadius:6, padding:'6px 10px' }}>
          <span>⚠ Contact non trouvé</span>
          <button onClick={() => onAdd({ nom:displayName, telephone:displayPhone, email:displayEmail })} style={{ fontSize:11, padding:'2px 8px', borderRadius:5, border:'0.5px solid #FAC775', background:'#fff', color:'#633806', cursor:'pointer' }}>+ Créer</button>
        </div>
      )}
    </div>
  );
}

function SearchView({ onOpenBien, biens, updateBien, setBiens, contacts }) {
  const [filters, setFilters] = useState({ cp:'86000', prixMin:'', prixMax:'', surfaceMin:'', type:'9', rendMin:'', contactId:'' });
  const [cpQuery, setCpQuery] = useState('86000 – Poitiers');
  const [listings, setListingsState] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_LISTINGS); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const setListings = (val) => {
    const next = typeof val === 'function' ? val(listings) : val;
    setListingsState(next);
    try { localStorage.setItem(STORAGE_LISTINGS, JSON.stringify(next)); } catch {}
  };
  const [loading, setLoading] = useState(false);
  const [loadingSheet, setLoadingSheet] = useState(false);
  const [analysingIA, setAnalysingIA]   = useState(false);
  const [iaProgress, setIaProgress]     = useState({ done: 0, total: 0 });
  const [analysingTravaux, setAnalysingTravaux] = useState(false);
  const [error, setError] = useState('');
  const [notif, setNotif] = useState('');
  const [lastRun, setLastRun] = useState(null);
  const [showEcartes, setShowEcartes] = useState(true);
  const [showExpired, setShowExpired] = useState(true);
  const [openDropdownId, setOpenDropdownId] = useState(null);

  const analyseTravaux = useCallback(async (ads) => {
    setAnalysingTravaux(true);
    const upd = [...ads];
    for (let i=0; i<Math.min(upd.length,15); i++) {
      if (!upd[i].travauxAnalyse) {
        const t = await analyseTravauxIA(upd[i].desc, upd[i].title);
        upd[i] = {...upd[i], travaux:t, travauxAnalyse:true};
        setListings([...upd]); updateBien(upd[i]);
      }
    }
    setAnalysingTravaux(false);
  }, [updateBien]);

  const processData = useCallback((data) => {
    const parsed = parseAds(data, filters, biens);
    parsed.forEach(a => updateBien(a));
    setListings(parsed); setLastRun(new Date());
    if (parsed.length===0) setError(`${data.total||0} annonce(s), aucune ne passe les filtres.`);
    else { setError(''); analyseTravaux(parsed); }
  }, [filters, biens, updateBien, analyseTravaux]);

  const chargerDepuisSheet = useCallback(async () => {
    setLoadingSheet(true); setNotif(''); setError('');
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getBiens&v=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.success && data.biens?.length) {
        setBiens(prev => {
          const next = {...prev};
          data.biens.forEach(b => {
            const bid = String(b.id);
            if (!bid) return;
            const ex = next[bid];
            const price = Number(b.price) || 0;
            const surface = Number(b.surface) || 0;
            const loyers = Number(b.loyers) || 0;
            const rendement = b.rendement ? parseFloat(b.rendement) : null;
            const ppm2 = surface > 0 ? Math.round(price / surface) : null;
            if (ex) {
              next[bid] = {
                ...ex,
                price, surface,
                // Le Sheet est toujours réécrit intégralement à chaque scan (loyers/rendement
                // recalculés) → on fait confiance à la valeur fraîche même si elle est vide/0,
                // plutôt que de garder indéfiniment une ancienne valeur en cache (ex: bug "2026%").
                loyers, rendement,
                ppm2: ppm2 ?? ex.ppm2,
                title: b.title || ex.title,
                url: b.url || ex.url,
                desc: b.desc || ex.desc || '',
                ownerName: b.ownerName || ex.ownerName || '',
                ownerPhone: b.ownerPhone || ex.ownerPhone || '',
                ownerType: b.ownerType || ex.ownerType || '',
                date: b.date || ex.date,
                lastSeen: b.lastSeen || ex.lastSeen,
                expired: b.expired !== undefined && b.expired !== '' ? (b.expired === 'true' || b.expired === true) : ex.expired,
                ia_analysed: b.ia_analysed || ex.ia_analysed,
                score_ia: b.score_ia || ex.score_ia,
                raison_ia: b.raison_ia || ex.raison_ia,
              };
            } else {
              next[bid] = {
                ...b, id: bid, price, surface, loyers, rendement, ppm2,
                fraisNotaire: b.fraisNotaire ?? FRAIS_NOTAIRE_DEFAULT,
                fraisAgence: b.fraisAgence ?? FRAIS_AGENCE_DEFAULT,
                statut: b.statut ?? 'Nouveau',
                interactions: b.interactions ? (typeof b.interactions === 'string' ? JSON.parse(b.interactions) : b.interactions) : [],
                notes: b.notes ?? '',
              };
            }
          });
          return next;
        });
        // Afficher directement les biens dans la liste
        const biensToShow = data.biens.map(b => {
          const price = Number(b.price) || 0;
          const surface = Number(b.surface) || 0;
          const loyers = Number(b.loyers) || 0;
          return {
            ...b,
            id: String(b.id),
            fraisNotaire: b.fraisNotaire ?? FRAIS_NOTAIRE_DEFAULT,
            fraisAgence: b.fraisAgence ?? FRAIS_AGENCE_DEFAULT,
            statut: b.statut ?? 'Nouveau',
            interactions: b.interactions ? (typeof b.interactions === 'string' ? JSON.parse(b.interactions) : b.interactions) : [],
            notes: b.notes ?? '',
            rendement: b.rendement ? parseFloat(b.rendement) : null,
            price, surface, loyers,
            ppm2: surface > 0 ? Math.round(price / surface) : null,
          };
        }).sort((a,b) => (b.rendement||0)-(a.rendement||0));
        setListings(biensToShow);
        setNotif(`✅ ${data.biens.length} biens chargés depuis le Sheet`);
        setLastRun(new Date());
      } else if (data.biens?.length === 0) {
        setNotif('⚠️ Sheet vide — lance d\'abord le bookmarklet');
      } else { setNotif('⚠️ Réponse inattendue'); }
    } catch(e) { setError(`❌ Erreur : ${e.message}`); }
    setLoadingSheet(false);
  }, [setBiens]);

  const runBatchIA = useCallback(async () => {
    const todo = listings.filter(l => { const b = biens[l.id]; return b?.desc && !b?.ia_analysed && !b?.score_ia; });
    if (!todo.length || analysingIA) return;
    setAnalysingIA(true); setIaProgress({ done: 0, total: todo.length });
    for (let i = 0; i < todo.length; i++) {
      const l = todo[i];
      try {
        const res  = await fetch(`${APPS_SCRIPT_URL}?action=analyzeAnnonce&id=${encodeURIComponent(l.id)}`);
        const data = await res.json();
        if (data.success && data.result) {
          const patch = { score_ia: data.result.score_ia, raison_ia: data.result.raison_ia, loyer_source: data.result.loyer_source, ia_analysed: new Date().toISOString().slice(0,10) };
          if (data.result.loyer_actuel) patch.loyers = data.result.loyer_actuel;
          if (data.result.loyer_potentiel) patch.loyer_potentiel = data.result.loyer_potentiel;

      {displayed.length>0&&(<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:10}}>
          {[['Annonces',displayed.length],['Rendement moy.',displayed.filter(l=>l.rendement).length?(displayed.filter(l=>l.rendement).reduce((s,l)=>s+l.rendement,0)/displayed.filter(l=>l.rendement).length).toFixed(1)+'%':'—'],['Avec travaux',displayed.filter(l=>l.travaux).length],['Écarté',displayed.filter(l=>l.statut==='Écarté').length]].map(([label,val])=>(<div key={label} style={{background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'8px 12px'}}><div style={{fontSize:11,color:'var(--color-text-secondary)',marginBottom:3}}>{label}</div><div style={{fontSize:18,fontWeight:500}}>{val}</div></div>))}

          <div style={{display:'grid',gridTemplateColumns:'2fr .6fr .8fr .8fr .8fr .7fr .8fr .8fr 90px',gap:4,padding:'6px 10px',fontSize:10,color:'var(--color-text-tertiary)',borderBottom:'0.5px solid var(--color-border-tertiary)',background:'var(--color-background-secondary)'}}>
            {[['title','Bien'],['cp','CP'],['price','Prix'],['surface','Surface'],['loyers','Loyers/an'],['ppm2','€/m²'],['rendement','Rendement'],['_contact','Contact'],['statut','Statut']].map(([col,label])=>(
              <span key={col} onClick={!col.startsWith('_')?()=>toggleSort(col):undefined} style={{cursor:!col.startsWith('_')?'pointer':'default',userSelect:'none',display:'inline-flex',alignItems:'center',gap:2}}>

              </span>
            ))}
          </div>
          {openDropdownId&&<div style={{position:'fixed',inset:0,zIndex:9}} onClick={()=>setOpenDropdownId(null)}/>}
          {displayed.filter(l=>(showEcartes||l.statut!=='Écarté')&&(showExpired||!l.expired)).map(l=>{
            const contact=l.contactId?contacts[l.contactId]:null; const ecarte=l.statut==='Écarté';
            const jours=joursDepuis(l.date); const fade=ecarte?0.4:1;
            return(<div key={l.id} onClick={()=>onOpenBien(l,displayed.map(d=>d.id))} style={{display:'grid',gridTemplateColumns:'2fr .6fr .8fr .8fr .8fr .7fr .8fr .8fr 90px',gap:4,padding:'8px 10px',fontSize:12,borderBottom:'0.5px solid var(--color-border-tertiary)',alignItems:'center',cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='var(--color-background-secondary)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{opacity:fade}}><div style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textDecoration:ecarte?'line-through':'none'}}>{cleanTitle(l.title)}</div><div style={{marginTop:2,display:'flex',gap:4,alignItems:'center'}}>{l.date&&<span style={{fontSize:10,color:'var(--color-text-primary)',fontWeight:500}}>Publié le {formatDate(l.date)}</span>}{jours!==null&&<span style={{fontSize:10,color:'var(--color-text-tertiary)'}}>il y a {jours} j</span>}{l.travaux&&<span style={{fontSize:10,color:'#633806',background:'#FAEEDA',border:'0.5px solid #FAC775',borderRadius:4,padding:'1px 5px'}}>⚠ travaux</span>}{l.isNew&&<span style={{fontSize:10,color:'#0C447C',background:'#E6F1FB',border:'0.5px solid #B5D4F4',borderRadius:4,padding:'1px 5px'}}>nouveau</span>}{l.expired&&<span style={{fontSize:10,color:'#791F1F',background:'#FCEBEB',border:'0.5px solid #F7C1C1',borderRadius:4,padding:'1px 5px'}}>expiré</span>}</div></div>
              <span style={{color:'var(--color-text-secondary)',fontSize:11,opacity:fade}}>{l.cp}</span>
              <span style={{opacity:fade}}>{l.price.toLocaleString('fr-FR')} €</span>

                </div>}

      </>)}
      {displayed.length===0&&!error&&<div style={{textAlign:'center',padding:'3rem 0',color:'var(--color-text-tertiary)',fontSize:13}}>Clique "☁️ Charger depuis Sheet" pour voir les biens.</div>}

function BienDetail({ bien: init, onUpdate, contacts, setContacts, onOpenContact, navPrev, navNext, onNav }) {
  const [bien, setBien] = useState(init);
  const [ni, setNi] = useState({ type:'Appel', date:new Date().toISOString().slice(0,10), note:'', auteur:'' });
  const [iaLoading, setIaLoading] = useState(false);
  const [iaResult, setIaResult] = useState(null);
  const [iaError, setIaError] = useState(null);
  useEffect(() => { setBien(init); setIaResult(null); setIaError(null); }, [init.id]);

  const analyzeWithIA = async () => {
    if (!bien.desc) { setIaError('Pas de description disponible — relance le bookmarklet pour importer ce bien.'); return; }
    setIaLoading(true); setIaResult(null); setIaError(null);
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=analyzeAnnonce&id=${encodeURIComponent(bien.id)}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Erreur inconnue');
      setIaResult(data.result);
      // Mettre à jour le bien local avec les nouveaux champs
      const patch = {};
      if (data.result.loyer_actuel)       patch.loyers = data.result.loyer_actuel;
      if (data.result.loyer_potentiel)    patch.loyer_potentiel = data.result.loyer_potentiel;
      if (data.result.dpe)                patch.dpe = data.result.dpe;
      if (data.result.ges)                patch.ges = data.result.ges;
      if (data.result.nb_lots)            patch.nb_lots = data.result.nb_lots;
      if (data.result.annee_construction) patch.annee_construction = data.result.annee_construction;
      if (data.result.travaux_type)       patch.travaux_type = data.result.travaux_type;
      if (data.result.travaux_resume)     patch.travaux_resume = data.result.travaux_resume;
      if (data.result.type_bien_ia)       patch.type_bien_ia = data.result.type_bien_ia;
      patch.ia_analysed = new Date().toISOString().slice(0,10);
      update(patch);
    } catch(err) { setIaError(err.message); }
    finally { setIaLoading(false); }
  };

  const update = (patch) => {
    const b = {...bien,...patch};
    if (patch.statut && patch.statut !== bien.statut) b.statutDate = new Date().toISOString().slice(0,10);
    setBien(b); onUpdate(b);
    // Sync champs clés vers Sheet
    if (patch.statut)       syncFieldToSheet(b.id, 'statut', b.statut);
    if (patch.notes !== undefined) syncFieldToSheet(b.id, 'notes', b.notes);
    if (patch.loyers !== undefined) syncFieldToSheet(b.id, 'loyers', b.loyers);
    if (patch.contactId !== undefined) syncFieldToSheet(b.id, 'contactId', b.contactId||'');
    if (patch.expired !== undefined) syncFieldToSheet(b.id, 'expired', b.expired);
  };

  const addInteraction = () => {
    if (!ni.note) return;
    const newInt = {...ni, id: Date.now()};
    const interactions = [...(bien.interactions||[]), newInt];
    const b = {...bien, interactions};
    setBien(b); onUpdate(b);
    // Push vers Sheet Interactions dédiée
    pushInteractionToSheet(newInt, bien.id, bien.title);
    setNi(i=>({...i, note:''}));
  };

  const fn = bien.fraisNotaire; const fa = bien.fraisAgence;
  const rendement = calcRendement(bien.price, bien.loyers, fn, fa);
  const prixRevient = bien.price*(1+fn) + bien.price*fa;
  const montantCredit = prixRevient - bien.creditApport;
  const mensualite = Math.round(calcMensualite(montantCredit, bien.creditTaux, bien.creditDuree));
  const loyerMensuel = bien.loyers?Math.round(bien.loyers/12):0;
  const cashflow = loyerMensuel - mensualite;
  const contactLie = bien.contactId?contacts[bien.contactId]:null;
  const addContactFromInfo = (info) => { const id='c_'+Date.now(); setContacts(p=>({...p,[id]:{id,nom:info.nom||'Contact',type:'Agent immobilier',telephone:info.telephone||'',email:info.email||'',ville:'',notes:'',interactions:[],createdAt:new Date().toISOString().slice(0,10)}})); update({contactId:id}); };
  const F = ({label,val,edit}) => (<div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:12,borderBottom:'0.5px solid var(--color-border-tertiary)'}}><span style={{color:'var(--color-text-secondary)'}}>{label}</span>{edit?<input type="number" value={val} onChange={e=>update({[edit]:parseFloat(e.target.value)||0})} style={{width:90,fontSize:12,padding:'2px 5px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)',textAlign:'right'}}/>:<span style={{fontWeight:500}}>{val}</span>}</div>);

  return (
    <div style={{padding:'14px 16px'}}>

      {/* ── Bandeau expiré ── */}
      {bien.expired&&<div style={{marginBottom:12,background:'#FCEBEB',border:'0.5px solid #F7C1C1',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#791F1F',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>⚠ Cette annonce n'est plus disponible sur LeBonCoin{bien.lastSeen?` · Dernière vue : ${formatDate(bien.lastSeen)}`:''}</span>
        <button onClick={()=>update({expired:false})} style={{fontSize:11,padding:'2px 8px',borderRadius:5,border:'0.5px solid #F7C1C1',background:'#fff',color:'#791F1F',cursor:'pointer'}}>Réactiver</button>
      </div>}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
          {(navPrev||navNext)&&<div style={{display:'flex',gap:2,flexShrink:0,marginTop:2}}>
            <button onClick={()=>navPrev&&onNav(navPrev)} disabled={!navPrev} title="Précédent" style={{fontSize:12,padding:'3px 7px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-secondary)',color:navPrev?'var(--color-text-primary)':'var(--color-text-tertiary)',cursor:navPrev?'pointer':'not-allowed'}}>◀</button>
            <button onClick={()=>navNext&&onNav(navNext)} disabled={!navNext} title="Suivant" style={{fontSize:12,padding:'3px 7px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-secondary)',color:navNext?'var(--color-text-primary)':'var(--color-text-tertiary)',cursor:navNext?'pointer':'not-allowed'}}>▶</button>
          </div>}
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:15,fontWeight:500}}>{cleanTitle(bien.title)}</span>
              <Badge statut={bien.statut}/>
              {bien.travaux&&<span style={{fontSize:11,color:'#633806',background:'#FAEEDA',border:'0.5px solid #FAC775',borderRadius:5,padding:'2px 7px'}}>⚠ {bien.travaux}</span>}
              {bien.expired&&<span style={{fontSize:11,color:'#791F1F',background:'#FCEBEB',border:'0.5px solid #F7C1C1',borderRadius:5,padding:'2px 7px'}}>Expiré</span>}
            </div>
            <div style={{fontSize:12,color:'var(--color-text-secondary)',marginTop:3}}>{bien.cp} {bien.ville}{bien.date?' · Publié le '+formatDate(bien.date):''}</div>
          </div>

        <div style={{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',padding:'10px 12px'}}>
          <div style={{fontSize:11,fontWeight:500,color:'var(--color-text-secondary)',marginBottom:8,textTransform:'uppercase'}}>Interactions</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
            <select value={ni.type} onChange={e=>setNi(i=>({...i,type:e.target.value}))} style={{fontSize:11,padding:'4px 6px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}>{INT_TYPES.map(t=><option key={t}>{t}</option>)}</select>
            <input type="date" value={ni.date} onChange={e=>setNi(i=>({...i,date:e.target.value}))} style={{fontSize:11,padding:'4px 6px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}/>
            <input value={ni.auteur} onChange={e=>setNi(i=>({...i,auteur:e.target.value}))} placeholder="Qui ? (Médéric, Louis…)" style={{fontSize:11,padding:'4px 6px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}/>
            <input value={ni.note} onChange={e=>setNi(i=>({...i,note:e.target.value}))} placeholder="Note..." style={{fontSize:11,padding:'4px 6px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}/>
            <button onClick={addInteraction} style={{gridColumn:'1/-1',fontSize:11,padding:'4px',borderRadius:5,border:'0.5px solid #B5D4F4',background:'#E6F1FB',color:'#0C447C',cursor:'pointer'}}>+ Ajouter & sync Sheet</button>
          </div>

            {(bien.interactions||[]).length===0&&<div style={{fontSize:12,color:'var(--color-text-tertiary)',fontStyle:'italic'}}>Aucune.</div>}
            {[...(bien.interactions||[])].reverse().map(i=>(
              <div key={i.id} style={{display:'flex',gap:8,padding:'5px 0',borderBottom:'0.5px solid var(--color-border-tertiary)',fontSize:12}}>
                <span style={{background:'#E6F1FB',color:'#0C447C',borderRadius:4,padding:'1px 5px',fontSize:10,fontWeight:500,flexShrink:0}}>{i.type}</span>
                <span style={{color:'var(--color-text-tertiary)',flexShrink:0}}>{formatDate(i.date)}</span>

function AnnuaireView({ contacts, setContacts, biens, onOpenContact }) {
  const [showForm, setShowForm] = useState(false); const [search, setSearch] = useState(''); const [filterType, setFilterType] = useState('');
  const [syncNotif, setSyncNotif] = useState(''); const [expandedAgences, setExpandedAgences] = useState({});
  const saveContact = (form) => { const id=form.id||'c_'+Date.now(); setContacts(p=>({...p,[id]:{...form,id,interactions:form.interactions||[],createdAt:form.createdAt||new Date().toISOString().slice(0,10)}})); setShowForm(false); };

  const syncFromBiens = () => {
    const existing = new Set(Object.values(contacts).map(c => (c.nom||'').toLowerCase().trim()));
    const toAdd = {};
    Object.values(biens).forEach(b => {
      const name = (b.ownerName || '').trim();
      if (!name || existing.has(name.toLowerCase())) return;
      const id = 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      toAdd[id] = { id, nom: name, type: b.ownerType === 'Professionnel' ? 'Agence' : b.ownerType === 'Particulier' ? 'Particulier' : 'Agence', telephone: b.ownerPhone || '', email: '', ville: b.ville || '', notes: '', adresse: '', siteWeb: b.ownerRatesLink || '', parentId: '', interactions: [], createdAt: new Date().toISOString().slice(0,10) };
      existing.add(name.toLowerCase());
    });
    const n = Object.keys(toAdd).length;
    if (n > 0) { setContacts(p => ({...p, ...toAdd})); setSyncNotif(`✅ ${n} contact${n>1?'s':''} importé${n>1?'s':''} depuis les biens`); }
    else { setSyncNotif('ℹ️ Tous les vendeurs sont déjà dans l\'annuaire'); }
    setTimeout(() => setSyncNotif(''), 4000);
  };

  // ── Structure parent/enfant ─────────────────────────────────────────────
  const agenceMap = {};
  Object.values(contacts).forEach(c => { if (c.type === 'Agence') agenceMap[c.id] = c; });

  const byParent = {}; const orphans = [];
  Object.values(contacts).forEach(c => {
    if (c.type === 'Agence') return;
    if (c.parentId && agenceMap[c.parentId]) {
      if (!byParent[c.parentId]) byParent[c.parentId] = [];
      byParent[c.parentId].push(c);
    } else { orphans.push(c); }
  });

  const sl = search.toLowerCase().trim();
  const matchStr = (c) => !sl || c.nom?.toLowerCase().includes(sl) || c.telephone?.includes(sl) || c.email?.toLowerCase().includes(sl);
  const matchType = (c) => !filterType || c.type === filterType;

  // Agences visibles (si l'agence elle-même match OU si un enfant match)
  const showAgences = (!filterType || filterType === 'Agence')
    ? Object.values(agenceMap).filter(a => matchStr(a) || (byParent[a.id]||[]).some(c => matchStr(c)))
    : [];

  // Auto-expand si enfant correspond à la recherche
  const autoExpand = {};
  if (sl) showAgences.forEach(a => { if ((byParent[a.id]||[]).some(c => matchStr(c))) autoExpand[a.id] = true; });
  const isExpanded = (id) => expandedAgences[id] || autoExpand[id];

  // Orphelins visibles
  const showOrphans = orphans.filter(c => matchStr(c) && matchType(c));

  const biensCount = (cid) => Object.values(biens).filter(b => b.contactId === cid).length;
  const cardBase = {display:'flex',gap:12,alignItems:'center',padding:'10px 14px',border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',cursor:'pointer'};

  return (<div style={{padding:'14px 16px'}}>
    <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher…" style={{fontSize:12,padding:'5px 10px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)',width:200}}/>
      <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{fontSize:12,padding:'5px 8px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}><option value="">Tous types</option>{TYPES_CONTACT.map(t=><option key={t}>{t}</option>)}</select>
      <button onClick={syncFromBiens} style={{fontSize:12,padding:'5px 12px',borderRadius:6,border:'0.5px solid #C0DD97',background:'#EAF3DE',color:'#27500A',cursor:'pointer'}}>⚡ Sync depuis biens</button>
      <button onClick={()=>setShowForm(true)} style={{fontSize:12,padding:'5px 14px',borderRadius:6,border:'0.5px solid #B5D4F4',background:'#E6F1FB',color:'#0C447C',cursor:'pointer',marginLeft:'auto'}}>+ Nouveau contact</button>
    </div>
    {syncNotif&&<div style={{marginBottom:10,fontSize:12,color:syncNotif.startsWith('✅')?'#27500A':'#633806',background:syncNotif.startsWith('✅')?'#EAF3DE':'#FAEEDA',borderRadius:6,padding:'6px 10px'}}>{syncNotif}</div>}
    {showForm&&<div style={{background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',marginBottom:14,border:'0.5px solid var(--color-border-tertiary)'}}><ContactForm onSave={saveContact} onCancel={()=>setShowForm(false)} contacts={contacts}/></div>}
    {showAgences.length===0&&showOrphans.length===0&&<div style={{textAlign:'center',padding:'3rem 0',color:'var(--color-text-tertiary)',fontSize:13}}>Aucun contact.</div>}
    <div style={{display:'grid',gap:8}}>
      {/* ── Agences avec agents dépliables ── */}
      {showAgences.map(agence => {
        const children = (byParent[agence.id]||[]).filter(c => matchStr(c) && matchType(c));
        const exp = isExpanded(agence.id);
        return (<React.Fragment key={agence.id}>
          <div onClick={()=>onOpenContact(agence)} style={cardBase} onMouseEnter={e=>e.currentTarget.style.background='var(--color-background-secondary)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#EEEDFE',color:'#3C3489',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:500,flexShrink:0}}>{agence.nom.slice(0,2).toUpperCase()}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:500,fontSize:13}}>{agence.nom}</div>
              <div style={{fontSize:11,color:'var(--color-text-secondary)',marginTop:2}}>Agence{agence.ville?` · ${agence.ville}`:''}</div>
            </div>
            <div style={{display:'flex',gap:8,fontSize:11,alignItems:'center',flexShrink:0}}>
              {agence.telephone&&<span style={{color:'var(--color-text-secondary)'}}>{agence.telephone}</span>}
              <span style={{background:'#EEEDFE',color:'#3C3489',borderRadius:5,padding:'2px 7px'}}>{biensCount(agence.id)} bien(s)</span>
              <button onClick={e=>{e.stopPropagation();window.open('https://www.google.com/search?q='+encodeURIComponent(agence.nom+(agence.ville?' '+agence.ville:'')),'_blank');}} title="Rechercher sur Google" style={{fontSize:11,padding:'3px 7px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-secondary)',cursor:'pointer',flexShrink:0}}>🔍</button>
              {children.length>0&&<button onClick={e=>{e.stopPropagation();setExpandedAgences(p=>({...p,[agence.id]:!p[agence.id]}));}} style={{fontSize:11,padding:'3px 8px',borderRadius:5,border:'0.5px solid #AFA9EC',background:'#EEEDFE',color:'#3C3489',cursor:'pointer',flexShrink:0}}>{exp?'▲':`${children.length} agent${children.length>1?'s':''} ▼`}</button>}
            </div>
          </div>
          {exp&&children.map(c=>(
            <div key={c.id} onClick={()=>onOpenContact(c)} style={{...cardBase,paddingLeft:32,borderLeftWidth:'2px',borderLeftColor:'#AFA9EC',borderLeftStyle:'solid',borderRadius:0,borderTopWidth:0,marginTop:-8}} onMouseEnter={e=>e.currentTarget.style.background='var(--color-background-secondary)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{fontSize:11,color:'var(--color-text-tertiary)',flexShrink:0,fontFamily:'var(--font-mono)'}}>└</span>
              <Avatar nom={c.nom}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,fontSize:13}}>{c.nom}</div>
                <div style={{fontSize:11,color:'var(--color-text-secondary)',marginTop:2}}>{c.type}{c.ville?` · ${c.ville}`:''}</div>
              </div>
              <div style={{display:'flex',gap:8,fontSize:11,alignItems:'center',flexShrink:0}}>
                {c.telephone&&<span style={{color:'var(--color-text-secondary)'}}>{c.telephone}</span>}
                <span style={{background:'#E6F1FB',color:'#0C447C',borderRadius:5,padding:'2px 7px'}}>{biensCount(c.id)} bien(s)</span>
              </div>
            </div>
          ))}
        </React.Fragment>);
      })}
      {/* ── Orphelins (sans agence parente) ── */}
      {showOrphans.length>0&&showAgences.length>0&&<div style={{fontSize:10,color:'var(--color-text-tertiary)',padding:'6px 0 2px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Contacts sans agence</div>}
      {showOrphans.map(c=>(<div key={c.id} onClick={()=>onOpenContact(c)} style={cardBase} onMouseEnter={e=>e.currentTarget.style.background='var(--color-background-secondary)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <Avatar nom={c.nom}/>
        <div style={{flex:1,minWidth:0}}><div style={{fontWeight:500,fontSize:13}}>{c.nom}</div><div style={{fontSize:11,color:'var(--color-text-secondary)',marginTop:2}}>{c.type}{c.ville?` · ${c.ville}`:''}</div></div>
        <div style={{display:'flex',gap:8,fontSize:11,alignItems:'center',flexShrink:0}}>{c.telephone&&<span style={{color:'var(--color-text-secondary)'}}>{c.telephone}</span>}<span style={{background:'#E6F1FB',color:'#0C447C',borderRadius:5,padding:'2px 7px'}}>{biensCount(c.id)} bien(s)</span></div>
      </div>))}
    </div>
  </div>);
}

function ContactDetail({ contact: init, onUpdate, biens, onOpenBien, onDelete, contacts }) {
  const [contact, setContact] = useState(init); const [editing, setEditing] = useState(false);
  const [niType, setNiType] = useState('Appel'); const [niDate, setNiDate] = useState(new Date().toISOString().slice(0,10));
  const [niNote, setNiNote] = useState('');
  useEffect(()=>{setContact(init);},[init.id]);
  const update=(patch)=>{const c={...contact,...patch};setContact(c);onUpdate(c);};
  const addInt=()=>{if(!niNote)return;update({interactions:[...(contact.interactions||[]),{type:niType,date:niDate,note:niNote,id:Date.now()}]});setNiNote('');};
  const biensDu=Object.values(biens).filter(b=>b.contactId===contact.id);
  const parentAgence = contact.parentId && contacts ? contacts[contact.parentId] : null;
  const inp={fontSize:11,padding:'4px 6px',borderRadius:5,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'};
  if(editing)return(<div style={{padding:'14px 16px'}}><ContactForm contact={contact} onSave={(f)=>{update(f);setEditing(false);}} onCancel={()=>setEditing(false)} contacts={contacts}/></div>);
  return (<div style={{padding:'14px 16px'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
      <div style={{display:'flex',gap:12,alignItems:'center'}}><Avatar nom={contact.nom}/><div>
        <div style={{fontSize:15,fontWeight:500}}>{contact.nom}</div>
        <div style={{fontSize:12,color:'var(--color-text-secondary)',marginTop:2}}>{contact.type}{contact.ville?` · ${contact.ville}`:''}</div>
        {parentAgence&&<div style={{fontSize:12,color:'var(--color-text-secondary)',marginTop:2}}>🏢 {parentAgence.nom}</div>}
        <div style={{display:'flex',gap:10,marginTop:4,fontSize:12,color:'var(--color-text-secondary)',flexWrap:'wrap'}}>
          {contact.telephone&&<span>📞 {contact.telephone}</span>}
          {contact.email&&<span>✉ {contact.email}</span>}
          {contact.adresse&&<span>📍 {contact.adresse}</span>}
        </div>
        {contact.siteWeb&&<div style={{marginTop:3,fontSize:12}}><a href={contact.siteWeb.startsWith('http')?contact.siteWeb:'https://'+contact.siteWeb} target="_blank" rel="noreferrer" style={{color:'#378ADD',textDecoration:'none'}}>🌐 {contact.siteWeb}</a></div>}
      </div></div>
      <div style={{display:'flex',gap:6}}><button onClick={()=>setEditing(true)} style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'transparent',color:'var(--color-text-secondary)',cursor:'pointer'}}>Modifier</button><button onClick={()=>onDelete(contact.id)} style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'0.5px solid #F7C1C1',background:'#FCEBEB',color:'#791F1F',cursor:'pointer'}}>Supprimer</button></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div style={{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',padding:'10px 12px'}}>
        <div style={{fontSize:11,fontWeight:500,color:'var(--color-text-secondary)',marginBottom:8,textTransform:'uppercase'}}>Ajouter une interaction</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
          <select value={niType} onChange={e=>setNiType(e.target.value)} style={inp}>{INT_TYPES.map(t=><option key={t}>{t}</option>)}</select>
          <input type="date" value={niDate} onChange={e=>setNiDate(e.target.value)} style={inp}/>
          <input value={niNote} onChange={e=>setNiNote(e.target.value)} placeholder="Note…" style={{...inp,gridColumn:'1/-1'}}/>
          <button onClick={addInt} style={{...inp,gridColumn:'1/-1',background:'#E6F1FB',color:'#0C447C',border:'0.5px solid #B5D4F4',cursor:'pointer',padding:'5px'}}>+ Ajouter</button>
        </div>
        {(contact.interactions||[]).length>0&&<div style={{marginTop:8,maxHeight:160,overflowY:'auto'}}>
          {[...(contact.interactions||[])].reverse().map(i=>(
            <div key={i.id} style={{display:'flex',gap:8,padding:'5px 0',borderBottom:'0.5px solid var(--color-border-tertiary)',fontSize:12}}>
              <span style={{background:'#E6F1FB',color:'#0C447C',borderRadius:4,padding:'1px 5px',fontSize:10,fontWeight:500,flexShrink:0}}>{i.type}</span>
              <span style={{color:'var(--color-text-tertiary)',flexShrink:0}}>{formatDate(i.date)}</span>
              <span style={{color:'var(--color-text-secondary)'}}>{i.note}</span>
            </div>
          ))}
        </div>}
      </div>
      <div style={{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',padding:'10px 12px'}}>
        <div style={{fontSize:11,fontWeight:500,color:'var(--color-text-secondary)',marginBottom:8,textTransform:'uppercase'}}>Biens ({biensDu.length})</div>
        {biensDu.length===0&&<div style={{fontSize:12,color:'var(--color-text-tertiary)',fontStyle:'italic'}}>Aucun.</div>}
        {biensDu.map(b=>(<div key={b.id} onClick={()=>onOpenBien(b)} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'0.5px solid var(--color-border-tertiary)',cursor:'pointer',fontSize:12}}><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{cleanTitle(b.title)}</span><span style={{flexShrink:0,marginLeft:8,color:'var(--color-text-secondary)'}}>{b.price?.toLocaleString('fr-FR')} €</span></div>))}
      </div>
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// ─── PHASE B : VUE AGENTS ───────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
function AgentsView({ biens, onOpenBien }) {
  const [interactions, setInteractions] = useState([]);
  const [loading, setLoading]           = useState(false);
  const [mode, setMode]                 = useState('file');    // 'file' | 'annuaire'
  const [sortBy, setSortBy]             = useState('rendement');
  const [feedback, setFeedback]         = useState({});        // key → {open,stock,rappel,segment,note,saving}
  const [expanded, setExpanded]         = useState(null);
  const [notif, setNotif]               = useState('');

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=getInteractions&v=${Date.now()}`);
        const d   = await res.json();
        if (d.success) setInteractions(d.interactions || []);
      } catch(e) { console.warn('getInteractions:', e); }
      setLoading(false);
    })();
  }, []);

  // ── Groupement biens → agents ──────────────────────────────────────────
  const agents = React.useMemo(() => {
    const groups = {};
    // Premier passage : biens actifs (non écartés) pour la file/annuaire
    Object.values(biens).forEach(b => {
      if (b.statut === 'Écarté') return;
      const key = (b.ownerName || '').trim() || '__anon__';
      if (!groups[key]) groups[key] = { key, name: b.ownerName || '', type: b.ownerType || '', phone: b.ownerPhone || '', biens: [], nbEtude: 0, nbEcartes: 0 };
      groups[key].biens.push(b);
      if (!groups[key].phone && b.ownerPhone) groups[key].phone = b.ownerPhone;
      if (!groups[key].type  && b.ownerType)  groups[key].type  = b.ownerType;
      if (b.statut === 'En étude' || b.statut === 'À qualifier' || b.statut === 'À étudier') groups[key].nbEtude++;
    });
    // Second passage : comptage des écartés par agent (sans les ajouter à la file)
    Object.values(biens).forEach(b => {
      if (b.statut !== 'Écarté') return;
      const key = (b.ownerName || '').trim() || '__anon__';
      if (groups[key]) groups[key].nbEcartes++;
    });
    return Object.values(groups).map(ag => {
      const rnds     = ag.biens.map(b => parseFloat(b.rendement)).filter(v => v > 0);
      const maxRend  = rnds.length ? Math.max(...rnds) : 0;
      const lastSeen = ag.biens.map(b => b.lastSeen || '').sort().pop() || '';
      // Appels pour cet agent : type='Appel agent' + bienTitle = ownerName
      const calls       = interactions.filter(i => i.type === 'Appel agent' && i.bienTitle === ag.name);
      const lastCallDate = calls.length ? calls.map(c => c.date || '').sort().pop() : null;
      const daysSince   = lastCallDate ? Math.floor((Date.now() - new Date(lastCallDate)) / 86400000) : null;
      const rel = daysSince === null ? 'jamais' : daysSince <= 30 ? 'actif' : 'relancer';
      return { ...ag, maxRend, nbBiens: ag.biens.length, lastSeen, lastCallDate, daysSince, rel };
    });
  }, [biens, interactions]);

  // ── Tri ───────────────────────────────────────────────────────────────
  const relOrder = { jamais: 0, relancer: 1, actif: 2 };
  const sorted = [...agents].sort((a, b) => {
    if (mode === 'file') {
      // File : 🔴 → 🟡 → 🟢, puis Rdt > Nb > Fraîcheur
      if (relOrder[a.rel] !== relOrder[b.rel]) return relOrder[a.rel] - relOrder[b.rel];
    }
    if (sortBy === 'rendement' || mode === 'file') {
      if (b.maxRend !== a.maxRend) return b.maxRend - a.maxRend;
      if (b.nbBiens !== a.nbBiens) return b.nbBiens - a.nbBiens;
      return b.lastSeen.localeCompare(a.lastSeen);
    }
    if (sortBy === 'nb')       return b.nbBiens - a.nbBiens;
    if (sortBy === 'fraicheur') return b.lastSeen.localeCompare(a.lastSeen);
    return 0;
  });

  // ── Helpers ───────────────────────────────────────────────────────────
  const relIcon  = s => s === 'jamais' ? '🔴' : s === 'relancer' ? '🟡' : '🟢';
  const relLabel = (s, d) => s === 'jamais' ? 'Jamais contacté' : s === 'relancer' ? `À relancer · ${d}j sans appel` : `Actif · dernier appel il y a ${d}j`;

  const topBien = ag => [...ag.biens].sort((a, b) => (parseFloat(b.rendement)||0) - (parseFloat(a.rendement)||0))[0];
  const scriptLabel = ag => {
    const b = topBien(ag);
    if (!b) return '';
    return `"Bonjour, j'ai vu votre annonce « ${b.title.slice(0,50)}… » — avez-vous d'autres immeubles de rapport ?"`;
  };

  // ── Feedback ──────────────────────────────────────────────────────────
  const openFb  = key => setFeedback(f => ({...f, [key]: { open:true, stock:null, rappel:null, segment:null, note:'', saving:false }}));
  const closeFb = key => setFeedback(f => { const n={...f}; delete n[key]; return n; });
  const toggleFb = (key, field, val) => setFeedback(f => ({...f, [key]: {...f[key], [field]: f[key][field]===val ? null : val }}));

  const saveFeedback = async ag => {
    const fb = feedback[ag.key]; if (!fb) return;
    setFeedback(f => ({...f, [ag.key]: {...fb, saving:true}}));
    const b   = topBien(ag);
    const int = { id: String(Date.now()), type:'Appel agent', date:new Date().toISOString().slice(0,10), auteur:'Médéric', bienTitle:ag.name||'Particulier', bienId:b?.id||'', note:JSON.stringify({stock:fb.stock,rappel:fb.rappel,segment:fb.segment, ...(fb.note?{note:fb.note}:{})}) };
    try {
      await pushInteractionToSheet(int, int.bienId, int.bienTitle);
      setInteractions(prev => [...prev, int]);
      closeFb(ag.key);
      setNotif(`✅ Appel « ${ag.name||'particulier'} » enregistré`);
      setTimeout(() => setNotif(''), 3000);
    } catch(e) { setFeedback(f => ({...f, [ag.key]: {...fb, saving:false}})); }
  };

  const FbBtn = ({ label, field, val, agKey }) => {
    const fb  = feedback[agKey] || {};
    const sel = fb[field] === val;
    return (
      <button onClick={() => toggleFb(agKey, field, val)} style={{ fontSize:11, padding:'5px 10px', borderRadius:6, cursor:'pointer', fontWeight:sel?500:400, border:sel?'1.5px solid #0C447C':'0.5px solid var(--color-border-secondary)', background:sel?'#E6F1FB':'var(--color-background-primary)', color:sel?'#0C447C':'var(--color-text-secondary)' }}>
        {label}
      </button>
    );
  };

  // ── Render ────────────────────────────────────────────────────────────
  return (
    <div style={{ padding:'14px 16px' }}>

      {/* Header */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <div>
          <span style={{ fontSize:15, fontWeight:500 }}>Agents & Vendeurs</span>
          <span style={{ fontSize:12, color:'var(--color-text-secondary)', marginLeft:10 }}>
            {agents.length} contacts · <span style={{color:'#791F1F'}}>{agents.filter(a=>a.rel==='jamais').length} jamais contactés</span> · <span style={{color:'#633806'}}>{agents.filter(a=>a.rel==='relancer').length} à relancer</span>
            {' · '}<span style={{color:'#3C3489'}}>{agents.reduce((s,a)=>s+a.nbEtude,0)} en étude</span>
            {' · '}<span style={{color:'var(--color-text-tertiary)'}}>{agents.reduce((s,a)=>s+a.nbEcartes,0)} écartés</span>
            {loading && ' · ⏳'}
          </span>
        </div>
        <div style={{ display:'flex', gap:6 }}>
          {[['file','📞 File d\'appels'],['annuaire','📋 Annuaire']].map(([m,l]) => (
            <button key={m} onClick={()=>setMode(m)} style={{ fontSize:12, padding:'5px 12px', borderRadius:6, cursor:'pointer', border:mode===m?'1.5px solid #0C447C':'0.5px solid var(--color-border-secondary)', background:mode===m?'#E6F1FB':'transparent', color:mode===m?'#0C447C':'var(--color-text-secondary)' }}>{l}</button>
          ))}
        </div>
      </div>

      {notif && <div style={{ marginBottom:10, fontSize:12, color:'#27500A', background:'#EAF3DE', borderRadius:6, padding:'6px 10px' }}>{notif}</div>}

      {/* Tri (annuaire seulement) */}
      {mode === 'annuaire' && (
        <div style={{ display:'flex', gap:6, marginBottom:12, alignItems:'center' }}>
          <span style={{ fontSize:11, color:'var(--color-text-tertiary)' }}>Trier par</span>
          {[['rendement','Rendement'],['nb','Nb biens'],['fraicheur','Fraîcheur']].map(([k,l]) => (
            <button key={k} onClick={()=>setSortBy(k)} style={{ fontSize:11, padding:'3px 8px', borderRadius:5, cursor:'pointer', border:sortBy===k?'1.5px solid #0C447C':'0.5px solid var(--color-border-secondary)', background:sortBy===k?'#E6F1FB':'transparent', color:sortBy===k?'#0C447C':'var(--color-text-secondary)' }}>{l}</button>
          ))}
        </div>
      )}

      {sorted.length === 0 && (
        <div style={{ textAlign:'center', padding:'3rem 0', color:'var(--color-text-tertiary)', fontSize:13 }}>
          Charge les biens depuis la Sheet pour voir les agents.
        </div>
      )}

      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {sorted.map(ag => {
          const fb         = feedback[ag.key];
          const isExpanded = expanded === ag.key;
          const bTop       = topBien(ag);
          return (
            <div key={ag.key} style={{ border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)', padding:'10px 12px', background:'var(--color-background-primary)' }}>

              {/* Ligne principale */}
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <span style={{ fontSize:16, flexShrink:0 }}>{relIcon(ag.rel)}</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                    <span style={{ fontSize:13, fontWeight:500 }}>{ag.name || 'Particulier (sans nom)'}</span>
                    {ag.type && <span style={{ fontSize:10, color:'var(--color-text-secondary)', background:'var(--color-background-secondary)', borderRadius:4, padding:'1px 6px' }}>{ag.type}</span>}
                    {ag.maxRend > 0 && <span style={{ fontSize:11, fontWeight:500, color:ag.maxRend>=8?'#27500A':'#633806' }}>↑ {ag.maxRend.toFixed(1)}%</span>}
                  </div>
                  <div style={{ fontSize:11, color:'var(--color-text-secondary)', marginTop:2 }}>
                    {relLabel(ag.rel, ag.daysSince)} · {ag.nbBiens} bien{ag.nbBiens>1?'s':''}
                    {(ag.nbEtude > 0 || ag.nbEcartes > 0) && (
                      <span style={{ marginLeft:6, color:'var(--color-text-tertiary)' }}>
                        ({[ag.nbEtude > 0 && `${ag.nbEtude} en étude`, ag.nbEcartes > 0 && `${ag.nbEcartes} écarté${ag.nbEcartes>1?'s':''}`].filter(Boolean).join(' · ')})
                      </span>
                    )}
                  </div>
                  {mode === 'file' && bTop && (
                    <div style={{ fontSize:11, color:'var(--color-text-tertiary)', marginTop:3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontStyle:'italic' }}>
                      {scriptLabel(ag)}
                    </div>
                  )}
                </div>
                <div style={{ display:'flex', gap:5, flexShrink:0, alignItems:'center' }}>
                  {ag.phone
                    ? <a href={`tel:${ag.phone}`} style={{ fontSize:11, padding:'4px 8px', borderRadius:6, border:'0.5px solid #C0DD97', background:'#EAF3DE', color:'#27500A', textDecoration:'none' }}>📞 {ag.phone}</a>
                    : <span style={{ fontSize:11, color:'var(--color-text-tertiary)' }}>📞 —</span>
                  }
                  {!fb && (
                    <button onClick={()=>openFb(ag.key)} style={{ fontSize:11, padding:'4px 10px', borderRadius:6, border:'0.5px solid #B5D4F4', background:'#E6F1FB', color:'#0C447C', cursor:'pointer' }}>
                      Appel ↓
                    </button>
                  )}
                  <button onClick={()=>setExpanded(isExpanded?null:ag.key)} style={{ fontSize:11, padding:'4px 8px', borderRadius:6, border:'0.5px solid var(--color-border-secondary)', background:'transparent', color:'var(--color-text-secondary)', cursor:'pointer', whiteSpace:'nowrap' }}>
                    {isExpanded ? '▲' : `${ag.nbBiens} bien${ag.nbBiens>1?'s':''} ▼`}
                  </button>
                </div>
              </div>

              {/* Feedback 3 clics */}
              {fb && (
                <div style={{ marginTop:10, padding:'10px 12px', background:'var(--color-background-secondary)', borderRadius:8, border:'0.5px solid #B5D4F4' }}>
                  <div style={{ fontSize:11, fontWeight:500, color:'var(--color-text-secondary)', marginBottom:8 }}>Résultat de l'appel — {new Date().toLocaleDateString('fr-FR')}</div>
                  <div style={{ display:'flex', gap:14, flexWrap:'wrap', marginBottom:8 }}>
                    <div style={{ display:'flex', gap:4, alignItems:'center' }}>
                      <span style={{ fontSize:11, color:'var(--color-text-secondary)' }}>Stock ?</span>
                      <FbBtn label="✅ Oui"  field="stock"   val={true}  agKey={ag.key}/>
                      <FbBtn label="❌ Non"  field="stock"   val={false} agKey={ag.key}/>
                    </div>
                    <div style={{ display:'flex', gap:4, alignItems:'center' }}>
                      <span style={{ fontSize:11, color:'var(--color-text-secondary)' }}>Rappel ?</span>
                      <FbBtn label="✅ Oui"  field="rappel"  val={true}  agKey={ag.key}/>
                      <FbBtn label="❌ Non"  field="rappel"  val={false} agKey={ag.key}/>
                    </div>
                    <div style={{ display:'flex', gap:4, alignItems:'center' }}>
                      <span style={{ fontSize:11, color:'var(--color-text-secondary)' }}>Segment ?</span>
                      <FbBtn label="✅ Confirmé" field="segment" val={true}  agKey={ag.key}/>
                      <FbBtn label="❌ Non"      field="segment" val={false} agKey={ag.key}/>
                    </div>
                  </div>
                  <div style={{ display:'flex', gap:6 }}>
                    <input value={fb.note} onChange={e=>setFeedback(f=>({...f,[ag.key]:{...fb,note:e.target.value}}))} placeholder="Note courte optionnelle…" style={{ flex:1, fontSize:11, padding:'4px 8px', borderRadius:5, border:'0.5px solid var(--color-border-secondary)', background:'var(--color-background-primary)', color:'var(--color-text-primary)' }}/>
                    <button onClick={()=>saveFeedback(ag)} disabled={fb.saving} style={{ fontSize:11, padding:'4px 12px', borderRadius:6, border:'0.5px solid #C0DD97', background:'#EAF3DE', color:'#27500A', cursor:fb.saving?'not-allowed':'pointer' }}>
                      {fb.saving ? '⏳…' : '✅ Enregistrer'}
                    </button>
                    <button onClick={()=>closeFb(ag.key)} style={{ fontSize:11, padding:'4px 8px', borderRadius:6, border:'0.5px solid var(--color-border-secondary)', background:'transparent', color:'var(--color-text-secondary)', cursor:'pointer' }}>Annuler</button>
                  </div>
                </div>
              )}

              {/* Liste des biens (dépliée) */}
              {isExpanded && (
                <div style={{ marginTop:10, borderTop:'0.5px solid var(--color-border-tertiary)', paddingTop:8 }}>
                  {[...ag.biens].sort((a,b)=>(parseFloat(b.rendement)||0)-(parseFloat(a.rendement)||0)).map(b => (
                    <div key={b.id} onClick={()=>onOpenBien(b)} style={{ display:'flex', alignItems:'center', gap:8, padding:'5px 0', borderBottom:'0.5px solid var(--color-border-tertiary)', cursor:'pointer', fontSize:12 }}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--color-background-secondary)'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{ fontWeight:500, color:(parseFloat(b.rendement)||0)>=8?'#27500A':'#633806', width:38, flexShrink:0 }}>
                        {b.rendement ? parseFloat(b.rendement).toFixed(1)+'%' : '—'}
                      </span>
                      <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{cleanTitle(b.title)}</span>
                      <span style={{ color:'var(--color-text-secondary)', fontSize:11, flexShrink:0 }}>{Number(b.price).toLocaleString('fr-FR')} €</span>
                      <Badge statut={b.statut}/>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BiensSuivisView({ biens, contacts, onOpenBien }) {
  const [filterStatut, setFilterStatut] = useState(''); const [sortBy, setSortBy] = useState('statutDate');
  const suivis=Object.values(biens).filter(b=>b.statut&&b.statut!=='Nouveau');
  const filtered=suivis.filter(b=>!filterStatut||b.statut===filterStatut).sort((a,b)=>{if(sortBy==='statutDate')return(b.statutDate||'').localeCompare(a.statutDate||'');if(sortBy==='rendement')return(b.rendement||0)-(a.rendement||0);return b.price-a.price;});
  return (<div style={{padding:'14px 16px'}}>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
      <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)} style={{fontSize:12,padding:'5px 8px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}><option value="">Tous statuts</option>{STATUTS.filter(s=>s!=='Nouveau').map(s=><option key={s}>{s}</option>)}</select>
      <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{fontSize:12,padding:'5px 8px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}><option value="statutDate">Date</option><option value="rendement">Rendement</option><option value="price">Prix</option></select>
      <span style={{fontSize:11,color:'var(--color-text-tertiary)',marginLeft:'auto'}}>{filtered.length} bien(s)</span>
    </div>
    {filtered.length===0&&<div style={{textAlign:'center',padding:'3rem 0',color:'var(--color-text-tertiary)',fontSize:13}}>Aucun bien suivi.</div>}
    <div style={{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',overflow:'hidden'}}>
      {filtered.length>0&&<div style={{display:'grid',gridTemplateColumns:'2fr .7fr .8fr .8fr .8fr 90px',gap:4,padding:'6px 10px',fontSize:10,color:'var(--color-text-tertiary)',borderBottom:'0.5px solid var(--color-border-tertiary)',background:'var(--color-background-secondary)'}}>{['Bien','CP','Prix','Rendement','Modifié','Statut'].map(h=><span key={h}>{h}</span>)}</div>}
      {filtered.map(b=>(<div key={b.id} onClick={()=>onOpenBien(b)} style={{display:'grid',gridTemplateColumns:'2fr .7fr .8fr .8fr .8fr 90px',gap:4,padding:'8px 10px',fontSize:12,borderBottom:'0.5px solid var(--color-border-tertiary)',alignItems:'center',cursor:'pointer',opacity:b.statut==='Écarté'?0.5:1}} onMouseEnter={e=>e.currentTarget.style.background='var(--color-background-secondary)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}}>{cleanTitle(b.title)}</div>
        <span style={{fontSize:11,color:'var(--color-text-secondary)'}}>{b.cp}</span>
        <span>{b.price?.toLocaleString('fr-FR')} €</span>
        <span style={{fontWeight:500,color:b.rendement>=8?'#27500A':b.rendement?'#633806':'var(--color-text-tertiary)'}}>{b.rendement?b.rendement+'%':'—'}</span>
        <span style={{fontSize:11,color:'var(--color-text-tertiary)'}}>{b.statutDate||'—'}</span>
        <Badge statut={b.statut}/>
      </div>))}
    </div>
  </div>);
}

function App() {
  const [biens, setBiens] = useStorage(STORAGE_BIENS);
  const [contacts, setContacts] = useStorage(STORAGE_CONTACTS);
  const [tabs, setTabs] = useState([{id:'search',type:'search',label:'Recherche'}]);
  const [activeTab, setActiveTab] = useState('search');
  const [navSection, setNavSection] = useState('search');
  const [navContext, setNavContext] = useState([]); // IDs dans l'ordre affiché au moment du clic

  const updateBien = useCallback((b)=>setBiens(p=>({...p,[b.id]:b})),[setBiens]);
  const updateContact = useCallback((c)=>setContacts(p=>({...p,[c.id]:c})),[setContacts]);
  const deleteContact = useCallback((id)=>{ setContacts(p=>{const n={...p};delete n[id];return n;}); setTabs(ts=>ts.filter(t=>t.id!=='contact_'+id)); setActiveTab('annuaire'); },[setContacts]);

  const openTab=(id,type,label,data)=>{setTabs(ts=>ts.find(t=>t.id===id)?ts:[...ts,{id,type,label,data}]);setActiveTab(id);};
  const openBien=(b,navIds=[])=>{setNavContext(navIds);openTab('bien_'+b.id,'bien',cleanTitle(b.title).slice(0,18)+'…',b);};
  const openContact=(c)=>{setNavSection('annuaire');openTab('contact_'+c.id,'contact',c.nom.slice(0,16),c);};
  const closeTab=(id,e)=>{e.stopPropagation();const idx=tabs.findIndex(t=>t.id===id);setTabs(ts=>ts.filter(t=>t.id!==id));if(activeTab===id)setActiveTab(tabs[Math.max(0,idx-1)]?.id||'search');};
  const handleNav=(id)=>{setNavSection(id);if(id==='search'){setActiveTab('search');return;}openTab(id,id,id==='annuaire'?'Annuaire':id==='agents'?'📞 Agents':'Vue',null);};
  const navigateBien=(bienId)=>{const nb=biens[bienId];if(!nb)return;setTabs(ts=>ts.map(t=>t.id===activeTab?{...t,data:nb,label:cleanTitle(nb.title).slice(0,18)+'…'}:t));};

  const currentTab=tabs.find(t=>t.id===activeTab);
  const renderContent=()=>{
    if(!currentTab)return null;
    if(currentTab.type==='search')return <SearchView onOpenBien={openBien} biens={biens} updateBien={updateBien} setBiens={setBiens} contacts={contacts}/>;
    if(currentTab.type==='annuaire')return <AnnuaireView contacts={contacts} setContacts={setContacts} biens={biens} onOpenContact={openContact}/>;
    if(currentTab.type==='agents')return <AgentsView biens={biens} onOpenBien={openBien}/>;
    if(currentTab.type==='bien'){
      const b=biens[currentTab.data?.id]||currentTab.data;
      if(!b)return null;
      const idx=navContext.indexOf(String(b.id));
      const navPrev=idx>0?navContext[idx-1]:null;
      const navNext=idx>=0&&idx<navContext.length-1?navContext[idx+1]:null;
      return <BienDetail bien={b} onUpdate={updateBien} contacts={contacts} setContacts={setContacts} onOpenContact={openContact} navPrev={navPrev} navNext={navNext} onNav={navigateBien}/>;
    }
    if(currentTab.type==='contact'){const c=contacts[currentTab.data?.id]||currentTab.data;return c?<ContactDetail contact={c} onUpdate={updateContact} biens={biens} onOpenBien={openBien} onDelete={deleteContact} contacts={contacts}/>:null;}
    return null;
  };

  const navItems=[{id:'search',section:'biens',label:'Recherche'},{id:'annuaire',section:'contacts',label:'Annuaire'}];

  return (
    <div style={{display:'flex',height:'100vh',fontFamily:'var(--font-sans)'}}>
      <div style={{width:164,background:'var(--color-background-secondary)',borderRight:'0.5px solid var(--color-border-tertiary)',display:'flex',flexDirection:'column',padding:'14px 0',flexShrink:0}}>
        <div style={{padding:'0 14px 14px',fontSize:14,fontWeight:500,borderBottom:'0.5px solid var(--color-border-tertiary)',marginBottom:8}}>ImmoInvest<span style={{fontSize:10,fontWeight:400,color:'var(--color-text-tertiary)',display:'block',marginTop:2}}>v36 · LBC + IA + Annuaire</span></div>
        <div style={{fontSize:10,color:'var(--color-text-tertiary)',padding:'4px 14px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Biens</div>
        {navItems.filter(n=>n.section==='biens').map(item=>(<div key={item.id} onClick={()=>handleNav(item.id)} style={{padding:'7px 14px',fontSize:12,color:navSection===item.id?'var(--color-text-primary)':'var(--color-text-secondary)',background:navSection===item.id?'var(--color-background-primary)':'transparent',borderRight:navSection===item.id?'2px solid #378ADD':'none',cursor:'pointer',fontWeight:navSection===item.id?500:400}}>{item.label}</div>))}
        <div style={{fontSize:10,color:'var(--color-text-tertiary)',padding:'10px 14px 4px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Relation</div>
        <div onClick={()=>handleNav('agents')} style={{padding:'7px 14px',fontSize:12,color:navSection==='agents'?'var(--color-text-primary)':'var(--color-text-secondary)',background:navSection==='agents'?'var(--color-background-primary)':'transparent',borderRight:navSection==='agents'?'2px solid #378ADD':'none',cursor:'pointer',fontWeight:navSection==='agents'?500:400}}>📞 Agents</div>
        <div style={{fontSize:10,color:'var(--color-text-tertiary)',padding:'10px 14px 4px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Contacts</div>
        <div onClick={()=>handleNav('annuaire')} style={{padding:'7px 14px',fontSize:12,color:navSection==='annuaire'?'var(--color-text-primary)':'var(--color-text-secondary)',background:navSection==='annuaire'?'var(--color-background-primary)':'transparent',borderRight:navSection==='annuaire'?'2px solid #378ADD':'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>Annuaire<span style={{fontSize:10,background:'#E6F1FB',color:'#0C447C',borderRadius:10,padding:'1px 6px'}}>{Object.keys(contacts).length}</span></div>
        <div style={{marginTop:'auto',padding:'10px 14px',borderTop:'0.5px solid var(--color-border-tertiary)',fontSize:11,color:'var(--color-text-tertiary)'}}>{Object.keys(biens).length} biens · {Object.keys(contacts).length} contacts</div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{display:'flex',borderBottom:'0.5px solid var(--color-border-tertiary)',background:'var(--color-background-secondary)',overflowX:'auto',flexShrink:0}}>
          {tabs.map(t=>(<div key={t.id} onClick={()=>{setActiveTab(t.id);if(t.type==='search')setNavSection('search');if(t.type==='annuaire')setNavSection('annuaire');if(t.type==='agents')setNavSection('agents');}} style={{padding:'7px 12px',fontSize:12,color:activeTab===t.id?'var(--color-text-primary)':'var(--color-text-secondary)',background:activeTab===t.id?'var(--color-background-primary)':'transparent',borderRight:'0.5px solid var(--color-border-tertiary)',cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6,fontWeight:activeTab===t.id?500:400,flexShrink:0}}>{t.label}{t.id!=='search'&&<span onClick={e=>closeTab(t.id,e)} style={{fontSize:13,color:'var(--color-text-tertiary)',marginLeft:2}}>×</span>}</div>))}
        </div>
        <div style={{flex:1,overflowY:'auto',background:'var(--color-background-primary)'}}>{renderContent()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
