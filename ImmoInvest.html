<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ImmoInvest</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f7f8;
      --color-text-primary: #111111;
      --color-text-secondary: #6b7280;
      --color-text-tertiary: #9ca3af;
      --color-border-secondary: #d1d5db;
      --color-border-tertiary: #e5e7eb;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-mono: 'Courier New', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    input, select, textarea, button { font-family: inherit; }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* Storage polyfill via localStorage */
  </style>
</head>
<body>
<div id="root"></div>
<script>
// Polyfill window.storage via localStorage
window.storage = {
  get: (key) => Promise.resolve(localStorage.getItem(key) ? { value: localStorage.getItem(key) } : null),
  set: (key, val) => { localStorage.setItem(key, val); return Promise.resolve(true); },
  delete: (key) => { localStorage.removeItem(key); return Promise.resolve(true); },
};
</script>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

const APPS_SCRIPT_URL = 'https://immoinvest-proxy.mederic-de-vaux.workers.dev';
const STORAGE_BIENS = 'immo_invest_biens_v3';
const STORAGE_CONTACTS = 'immo_invest_contacts_v3';
const FRAIS_NOTAIRE_DEFAULT = 0.08;
const FRAIS_AGENCE_DEFAULT = 0.05;

const TYPES_BIEN = [
  { id: "9", label: "Tous" }, { id: "9_5", label: "Immeuble" },
  { id: "9_7", label: "Local commercial" }, { id: "9_1", label: "Appartement" }, { id: "9_2", label: "Maison" },
];
const STATUTS = ["Nouveau", "En étude", "Contacté", "Visité", "Suivi", "Écarté"];
const STATUT_COLORS = {
  "Nouveau":   { bg: "#E6F1FB", text: "#0C447C", border: "#B5D4F4" },
  "En étude":  { bg: "#EEEDFE", text: "#3C3489", border: "#AFA9EC" },
  "Contacté":  { bg: "#FAEEDA", text: "#633806", border: "#FAC775" },
  "Visité":    { bg: "#EAF3DE", text: "#27500A", border: "#C0DD97" },
  "Suivi":     { bg: "#E1F5EE", text: "#085041", border: "#5DCAA5" },
  "Écarté":    { bg: "#FCEBEB", text: "#791F1F", border: "#F7C1C1" },
};
const TYPES_CONTACT = ["Agent immobilier","Notaire","Chasseur immobilier","Particulier","Marchand de biens","Syndic","Gestionnaire","Promoteur","Autre"];
const INT_TYPES = ["Appel","Email","RDV","Visite","SMS","Note"];

function Badge({ statut }) {
  const c = STATUT_COLORS[statut] || STATUT_COLORS["Nouveau"];
  return <span style={{ background: c.bg, color: c.text, border: `0.5px solid ${c.border}`, borderRadius: 5, padding: "2px 7px", fontSize: 11, fontWeight: 500 }}>{statut}</span>;
}
function Avatar({ nom }) {
  const i = nom?.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() || '?';
  return <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#E6F1FB', color: '#0C447C', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 500, flexShrink: 0 }}>{i}</div>;
}
function calcRendement(prix, loyers, fn, fa) {
  if (!prix || !loyers) return null;
  return ((loyers / (prix * (1 + fn) + prix * fa)) * 100).toFixed(1);
}
function calcMensualite(m, t, d) {
  const r = t / 12 / 100, n = d * 12;
  if (r === 0) return m / n;
  return (m * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}
function extractLoyers(desc) {
  if (!desc) return 0;
  const a = desc.match(/loyers?\s*annuels?\s*[:\s]*(\d[\d\s]*)\s*€/i) || desc.match(/(\d[\d\s]+)\s*€\s*\/\s*an/i);
  const m = desc.match(/loyers?\s*mensuel[s]?\s*[:\s]*(\d[\d\s]*)\s*€/i) || desc.match(/(\d[\d\s]+)\s*€\s*\/\s*mois/i) || desc.match(/(\d[\d\s]+)\s*€\s*de\s*loyers?/i);
  if (a) return parseFloat(a[1].replace(/\s/g,''));
  if (m) return parseFloat(m[1].replace(/\s/g,'')) * 12;
  return 0;
}
function extractContactFromDesc(desc) {
  if (!desc) return null;
  const tel = desc.match(/(?:tel|tél|téléphone|contact|appel|nous|moi)?[\s:]*(\+?(?:33|0)[1-9](?:[\s.-]?\d{2}){4})/i);
  const email = desc.match(/[\w.-]+@[\w.-]+\.[a-z]{2,}/i);
  const agence = desc.match(/(?:agence|cabinet|immo(?:bilier)?|notaire)\s+([A-ZÀ-Ú][A-Za-zÀ-ú\s]{2,25})/i);
  if (!tel && !email) return null;
  return { telephone: tel?.[1]?.replace(/[\s.-]/g,'') || '', email: email?.[0] || '', nom: agence?.[1]?.trim() || '' };
}
async function analyseTravauxIA(desc, title) {
  if (!desc) return null;
  const kw = ['travaux','rénov','rafraîch','toiture','électric','plomberie','isolation','ravalement','chauffage','fenêtre','à restaurer','à rénover'];
  if (!kw.some(k => desc.toLowerCase().includes(k))) return null;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:100, messages:[{role:'user',content:`Annonce:"${title}". Desc:"${desc.slice(0,600)}". Liste 5 mots max les travaux. Si aucun précis:"travaux non détaillés". Réponds uniquement la liste.`}]})});
    const d = await res.json(); return d.content?.[0]?.text?.trim() || null;
  } catch { return 'travaux mentionnés'; }
}
function useStorage(key) {
  const [data, setDataState] = useState({});
  const loaded = useRef(false);
  useEffect(() => {
    if (loaded.current) return; loaded.current = true;
    window.storage?.get(key).then(r => { if (r?.value) try { setDataState(JSON.parse(r.value)); } catch {} }).catch(()=>{});
  }, [key]);
  const setData = useCallback((u) => {
    setDataState(prev => { const next = typeof u==='function'?u(prev):u; window.storage?.set(key,JSON.stringify(next)).catch(()=>{}); return next; });
  }, [key]);
  return [data, setData];
}
function parseAds(data, filters, existing) {
  return (data.ads||[]).map(ad => {
    const ex = existing[ad.list_id];
    const price = ad.price?.[0]||0;
    const surfAttr = ad.attributes?.find(a=>a.key==='square');
    const surface = surfAttr ? parseInt(surfAttr.value_label) : parseInt(ad.subject?.match(/(\d+)\s*m/)?.[1])||0;
    const loyers = extractLoyers(ad.body);
    const fn = ex?.fraisNotaire ?? FRAIS_NOTAIRE_DEFAULT;
    const fa = ex?.fraisAgence ?? FRAIS_AGENCE_DEFAULT;
    const rend = calcRendement(price, ex?.loyers??loyers, fn, fa);
    const contactInfo = extractContactFromDesc(ad.body);
    const owner = ad.owner || {};
    return {
      id: ad.list_id, title: ad.subject||'Sans titre', price, surface,
      ownerName: ex?.ownerName ?? (owner.name || owner.store_name || ''),
      ownerPhone: ex?.ownerPhone ?? (owner.phone_number || ''),
      ownerType: ex?.ownerType ?? (owner.type === 'pro' ? 'Professionnel' : owner.type === 'private' ? 'Particulier' : ''),
      loyers: ex?.loyers??loyers, rendement: rend?parseFloat(rend):null,
      ppm2: surface>0?Math.round(price/surface):null,
      cp: ad.location?.zipcode||'', ville: ad.location?.city||'',
      desc: ad.body?.slice(0,1000)||'', url: ad.url||'#',
      date: ad.first_publication_date?.slice(0,10)||'', source:'LeBonCoin',
      statut: ex?.statut??'Nouveau', statutDate: ex?.statutDate??new Date().toISOString().slice(0,10),
      notes: ex?.notes??'', contactId: ex?.contactId??null,
      fraisNotaire: fn, fraisAgence: fa,
      creditApport: ex?.creditApport??Math.round(price*0.2),
      creditDuree: ex?.creditDuree??20, creditTaux: ex?.creditTaux??3.8,
      interactions: ex?.interactions??[],
      travaux: ex?.travaux??null, travauxAnalyse: ex?.travauxAnalyse??false,
      contactInfo: ex?.contactInfo??contactInfo,
      isNew: !ex,
    };
  }).filter(a => {
    if (filters.prixMin && a.price<filters.prixMin) return false;
    if (filters.prixMax && a.price>filters.prixMax) return false;
    if (filters.surfaceMin && a.surface<filters.surfaceMin) return false;
    if (filters.rendMin && a.rendement && a.rendement<filters.rendMin) return false;
    return true;
  }).sort((a,b) => (b.rendement||0)-(a.rendement||0));
}

function PctField({ label, value, onChange, prix }) {
  const pct = (value*100).toFixed(1);
  const euros = Math.round(prix * value);
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 0', fontSize:12, borderBottom:'0.5px solid var(--color-border-tertiary)' }}>
      <span style={{ color:'var(--color-text-secondary)', flex:1 }}>{label}</span>
      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
        <div style={{ display:'flex', alignItems:'center', border:'0.5px solid var(--color-border-secondary)', borderRadius:6, overflow:'hidden' }}>
          <input type="number" value={pct} step="0.1" min="0" max="20" onChange={e => onChange(parseFloat(e.target.value||0)/100)} style={{ width:52, fontSize:12, padding:'2px 5px', border:'none', background:'var(--color-background-primary)', color:'var(--color-text-primary)', textAlign:'right' }} />
          <span style={{ fontSize:11, padding:'0 5px', color:'var(--color-text-tertiary)', background:'var(--color-background-secondary)' }}>%</span>
        </div>
        <span style={{ fontSize:11, color:'var(--color-text-secondary)', minWidth:80, textAlign:'right', fontWeight:500 }}>{euros.toLocaleString('fr-FR')} €</span>
      </div>
    </div>
  );
}

function LoyerField({ value, onChange }) {
  const [draft, setDraft] = useState(value||0);
  useEffect(() => { setDraft(value||0); }, [value]);
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 0', fontSize:12, borderBottom:'0.5px solid var(--color-border-tertiary)' }}>
      <span style={{ color:'var(--color-text-secondary)' }}>Loyers annuels (€)</span>
      <div style={{ display:'flex', alignItems:'center', gap:4 }}>
        <input type="number" value={draft} step="1000" min="0" onChange={e => setDraft(parseFloat(e.target.value)||0)} onBlur={() => onChange(draft)} onKeyDown={e => e.key==='Enter' && onChange(draft)} style={{ width:100, fontSize:12, padding:'2px 5px', borderRadius:5, border:'0.5px solid var(--color-border-secondary)', background:'var(--color-background-primary)', color:'var(--color-text-primary)', textAlign:'right' }} />
        <span style={{ fontSize:11, color:'var(--color-text-tertiary)' }}>€/an</span>
      </div>
    </div>
  );
}

function ContactInfoBlock({ bien, contacts, onLink, onAdd }) {
  const info = bien.contactInfo || {};
  const displayName = bien.ownerName || info.nom || '';
  const displayPhone = bien.ownerPhone || info.telephone || '';
  const displayEmail = info.email || '';
  const hasInfo = displayName || displayPhone || displayEmail;
  const match = Object.values(contacts).find(c =>
    (displayPhone && c.telephone?.replace(/\D/g,'') === displayPhone.replace(/\D/g,'')) ||
    (displayEmail && c.email === displayEmail) ||
    (displayName && c.nom?.toLowerCase() === displayName.toLowerCase())
  );
  if (!hasInfo) return <div style={{ fontSize:11, color:'var(--color-text-tertiary)', fontStyle:'italic', marginTop:8 }}>Aucune information de contact détectée.</div>;
  return (
    <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:6 }}>
      <div style={{ fontSize:11, fontWeight:500, color:'var(--color-text-secondary)', textTransform:'uppercase', letterSpacing:'0.04em' }}>Contact détecté</div>
      <div style={{ background:'var(--color-background-secondary)', borderRadius:6, padding:'7px 10px', fontSize:12 }}>
        {displayName && <div style={{ fontWeight:500 }}>{displayName} {bien.ownerType ? <span style={{ fontWeight:400, color:'var(--color-text-secondary)' }}>· {bien.ownerType}</span> : ''}</div>}
        {displayPhone && <div style={{ color:'var(--color-text-secondary)', marginTop:2 }}>📞 {displayPhone}</div>}
        {displayEmail && <div style={{ color:'var(--color-text-secondary)', marginTop:2 }}>✉ {displayEmail}</div>}
      </div>
      {match ? (
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:11, color:'#27500A', background:'#EAF3DE', borderRadius:6, padding:'6px 10px' }}>
          <span>✓ Dans la base : <strong>{match.nom}</strong></span>
          <button onClick={() => onLink(match.id)} style={{ fontSize:11, padding:'2px 8px', borderRadius:5, border:'0.5px solid #C0DD97', background:'#fff', color:'#27500A', cursor:'pointer' }}>Lier</button>
        </div>
      ) : (
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:11, color:'#633806', background:'#FAEEDA', borderRadius:6, padding:'6px 10px' }}>
          <span>⚠ Contact non trouvé</span>
          <button onClick={() => onAdd({ nom:displayName, telephone:displayPhone, email:displayEmail })} style={{ fontSize:11, padding:'2px 8px', borderRadius:5, border:'0.5px solid #FAC775', background:'#fff', color:'#633806', cursor:'pointer' }}>+ Créer</button>
        </div>
      )}
    </div>
  );
}

function SearchView({ onOpenBien, biens, updateBien, setBiens, contacts }) {
  const [filters, setFilters] = useState({ cp:'86000', prixMin:'', prixMax:500000, surfaceMin:200, type:'9', rendMin:'', contactId:'' });
  const [cpQuery, setCpQuery] = useState('86000 – Poitiers');
  const [listings, setListings] = useState([]);
  const [loading, setLoading] = useState(false);
  const [loadingSheet, setLoadingSheet] = useState(false);
  const [analysingTravaux, setAnalysingTravaux] = useState(false);
  const [error, setError] = useState('');
  const [notif, setNotif] = useState('');
  const [lastRun, setLastRun] = useState(null);
  const [jsonInput, setJsonInput] = useState('');
  const [showPaste, setShowPaste] = useState(false);
  const [showEcartes, setShowEcartes] = useState(true);

  const analyseTravaux = useCallback(async (ads) => {
    setAnalysingTravaux(true);
    const upd = [...ads];
    for (let i=0; i<Math.min(upd.length,15); i++) {
      if (!upd[i].travauxAnalyse) {
        const t = await analyseTravauxIA(upd[i].desc, upd[i].title);
        upd[i] = {...upd[i], travaux:t, travauxAnalyse:true};
        setListings([...upd]); updateBien(upd[i]);
      }
    }
    setAnalysingTravaux(false);
  }, [updateBien]);

  const processData = useCallback((data) => {
    const parsed = parseAds(data, filters, biens);
    parsed.forEach(a => updateBien(a));
    setListings(parsed); setLastRun(new Date());
    if (parsed.length===0) setError(`${data.total||0} annonce(s), aucune ne passe les filtres.`);
    else { setError(''); analyseTravaux(parsed); }
  }, [filters, biens, updateBien, analyseTravaux]);

  const chargerDepuisSheet = useCallback(async () => {
    setLoadingSheet(true); setNotif(''); setError('');
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getBiens&v=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.success && data.biens?.length) {
        setBiens(prev => {
          const existingIds = new Set(Object.keys(prev));
          const nouveaux = {};
          data.biens.forEach(b => {
            const bid = String(b.id);
            if (bid && !existingIds.has(bid)) {
              nouveaux[bid] = { ...b, id: bid,
                fraisNotaire: b.fraisNotaire ?? FRAIS_NOTAIRE_DEFAULT,
                fraisAgence: b.fraisAgence ?? FRAIS_AGENCE_DEFAULT,
                statut: b.statut ?? 'Nouveau',
                interactions: b.interactions ? (typeof b.interactions === 'string' ? JSON.parse(b.interactions) : b.interactions) : [],
                notes: b.notes ?? '',
              };
            }
          });
          return { ...prev, ...nouveaux };
        });
        setNotif(`✅ ${data.biens.length} biens chargés depuis le Sheet`);
        setLastRun(new Date());
      } else if (data.biens?.length === 0) {
        setNotif('⚠️ Sheet vide — lance d\'abord le bookmarklet');
      } else { setNotif('⚠️ Réponse inattendue'); }
    } catch(e) { setError(`❌ Erreur : ${e.message}`); }
    setLoadingSheet(false);
  }, [setBiens]);

  const runPaste = () => { try { processData(JSON.parse(jsonInput)); setShowPaste(false); setJsonInput(''); } catch { setError('JSON invalide.'); } };

  const exportCsv = () => {
    const rows = [['Titre','CP','Prix','Surface','Loyers/an','Rendement','Travaux','Statut','Contact','Notes','URL']];
    listings.forEach(l => { const c = l.contactId?contacts[l.contactId]:null; rows.push([l.title,l.cp,l.price,l.surface,l.loyers,l.rendement?l.rendement+'%':'',l.travaux||'',l.statut,c?c.nom:'',l.notes,l.url]); });
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+csv); a.download='immo_invest.csv'; a.click();
  };

  const inp = { fontSize:12, padding:'4px 7px', borderRadius:6, border:'0.5px solid var(--color-border-secondary)', background:'var(--color-background-primary)', color:'var(--color-text-primary)', width:'100%' };
  const displayed = listings.map(l=>({...l,...biens[l.id]})).filter(l => !filters.contactId || l.contactId===filters.contactId);

  return (
    <div style={{padding:'14px 16px'}}>
      <div style={{background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'12px 14px',marginBottom:12}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr 1fr 1fr',gap:8,marginBottom:8}}>
          {[['Code postal',<input key="cp" value={cpQuery} onChange={e=>{setCpQuery(e.target.value);setFilters(f=>({...f,cp:e.target.value.split(/[\s–-]/)[0]}));}} style={inp}/>],
            ['Prix min (€)',<input key="pmin" type="number" value={filters.prixMin} onChange={e=>setFilters(f=>({...f,prixMin:e.target.value}))} placeholder="0" style={inp}/>],
            ['Prix max (€)',<input key="pmax" type="number" value={filters.prixMax} onChange={e=>setFilters(f=>({...f,prixMax:e.target.value}))} style={inp}/>],
            ['Surface min',<input key="surf" type="number" value={filters.surfaceMin} onChange={e=>setFilters(f=>({...f,surfaceMin:e.target.value}))} style={inp}/>],
            ['Rendement min',<input key="rend" type="number" value={filters.rendMin} onChange={e=>setFilters(f=>({...f,rendMin:e.target.value}))} placeholder="8" style={inp}/>],
            ['Type',<select key="type" value={filters.type} onChange={e=>setFilters(f=>({...f,type:e.target.value}))} style={inp}>{TYPES_BIEN.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select>],
            ['Contact',<select key="contact" value={filters.contactId} onChange={e=>setFilters(f=>({...f,contactId:e.target.value}))} style={inp}><option value="">Tous</option>{Object.values(contacts).map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</select>],
          ].map(([label,input])=>(<div key={label}><div style={{fontSize:10,color:'var(--color-text-tertiary)',marginBottom:3}}>{label}</div>{input}</div>))}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <button onClick={chargerDepuisSheet} disabled={loadingSheet} style={{fontSize:12,padding:'5px 12px',borderRadius:6,border:'0.5px solid #C0DD97',background:'#EAF3DE',color:'#27500A',cursor:loadingSheet?'not-allowed':'pointer',opacity:loadingSheet?0.7:1}}>
            {loadingSheet?'⏳ Chargement…':'☁️ Charger depuis Sheet'}
          </button>
          <button onClick={()=>setShowPaste(p=>!p)} style={{fontSize:12,padding:'5px 12px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'transparent',color:'var(--color-text-secondary)',cursor:'pointer'}}>📋 Coller JSON</button>
          {listings.length>0&&<button onClick={exportCsv} style={{fontSize:12,padding:'5px 12px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'transparent',color:'var(--color-text-secondary)',cursor:'pointer'}}>Export CSV</button>}
          {analysingTravaux&&<span style={{fontSize:11,color:'#633806',background:'#FAEEDA',borderRadius:5,padding:'3px 8px'}}>Analyse travaux…</span>}
          {lastRun&&<span style={{fontSize:11,color:'var(--color-text-tertiary)'}}>Maj : {lastRun.toLocaleTimeString('fr-FR')}</span>}
        </div>
        {notif&&<div style={{marginTop:8,fontSize:12,color:notif.startsWith('✅')?'#27500A':'#633806',background:notif.startsWith('✅')?'#EAF3DE':'#FAEEDA',borderRadius:6,padding:'6px 10px'}}>{notif}</div>}
        {showPaste&&(<div style={{marginTop:10}}><textarea value={jsonInput} onChange={e=>setJsonInput(e.target.value)} rows={3} placeholder='{"ads": [...]}' style={{width:'100%',fontSize:11,fontFamily:'var(--font-mono)',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',padding:6,background:'var(--color-background-primary)',color:'var(--color-text-primary)',resize:'vertical'}}/><button onClick={runPaste} style={{marginTop:4,fontSize:12,padding:'4px 10px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',cursor:'pointer',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}>Analyser</button></div>)}
      </div>
      {error&&<div style={{fontSize:12,color:'#791F1F',background:'#FCEBEB',border:'0.5px solid #F7C1C1',borderRadius:8,padding:'7px 10px',marginBottom:10}}>{error}</div>}
      {displayed.length>0&&(<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:10}}>

          })}

      </>)}

  );
}

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
      <div style={{display:'flex',gap:12,alignItems:'center'}}><Avatar nom={contact.nom}/><div><div style={{fontSize:15,fontWeight:500}}>{contact.nom}</div><div style={{fontSize:12,color:'var(--color-text-secondary)',marginTop:2}}>{contact.type}{contact.ville?` · ${contact.ville}`:''}</div><div style={{display:'flex',gap:10,marginTop:4,fontSize:12,color:'var(--color-text-secondary)'}}>{contact.telephone&&<span>📞 {contact.telephone}</span>}{contact.email&&<span>✉ {contact.email}</span>}</div></div></div>
      <div style={{display:'flex',gap:6}}><button onClick={()=>setEditing(true)} style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'transparent',color:'var(--color-text-secondary)',cursor:'pointer'}}>Modifier</button><button onClick={()=>onDelete(contact.id)} style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'0.5px solid #F7C1C1',background:'#FCEBEB',color:'#791F1F',cursor:'pointer'}}>Supprimer</button></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div style={{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',padding:'10px 12px'}}>
        <div style={{fontSize:11,fontWeight:500,color:'var(--color-text-secondary)',marginBottom:8,textTransform:'uppercase'}}>Ajouter une interaction</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
          <select value={niType} onChange={e=>setNiType(e.target.value)} style={inp}>{INT_TYPES.map(t=><option key={t}>{t}</option>)}</select>
          <input type="date" value={niDate} onChange={e=>setNiDate(e.target.value)} style={inp}/>
          <input value={niNote} onChange={e=>setNiNote(e.target.value)} placeholder="Note…" style={{...inp,gridColumn:'1/-1'}}/>
          <button onClick={addInt} style={{...inp,gridColumn:'1/-1',background:'#E6F1FB',color:'#0C447C',border:'0.5px solid #B5D4F4',cursor:'pointer',padding:'5px'}}>+ Ajouter</button>
        </div>
      </div>
      <div style={{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',padding:'10px 12px'}}>
        <div style={{fontSize:11,fontWeight:500,color:'var(--color-text-secondary)',marginBottom:8,textTransform:'uppercase'}}>Biens ({biensDu.length})</div>
        {biensDu.length===0&&<div style={{fontSize:12,color:'var(--color-text-tertiary)',fontStyle:'italic'}}>Aucun.</div>}
        {biensDu.map(b=>(<div key={b.id} onClick={()=>onOpenBien(b)} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'0.5px solid var(--color-border-tertiary)',cursor:'pointer',fontSize:12}}><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{b.title}</span><span style={{flexShrink:0,marginLeft:8,color:'var(--color-text-secondary)'}}>{b.price?.toLocaleString('fr-FR')} €</span></div>))}
      </div>
    </div>
  </div>);
}

function BiensSuivisView({ biens, contacts, onOpenBien }) {
  const [filterStatut, setFilterStatut] = useState(''); const [sortBy, setSortBy] = useState('statutDate');
  const suivis=Object.values(biens).filter(b=>b.statut&&b.statut!=='Nouveau');
  const filtered=suivis.filter(b=>!filterStatut||b.statut===filterStatut).sort((a,b)=>{if(sortBy==='statutDate')return(b.statutDate||'').localeCompare(a.statutDate||'');if(sortBy==='rendement')return(b.rendement||0)-(a.rendement||0);return b.price-a.price;});
  return (<div style={{padding:'14px 16px'}}>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
      <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)} style={{fontSize:12,padding:'5px 8px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}><option value="">Tous statuts</option>{STATUTS.filter(s=>s!=='Nouveau').map(s=><option key={s}>{s}</option>)}</select>
      <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{fontSize:12,padding:'5px 8px',borderRadius:6,border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-primary)',color:'var(--color-text-primary)'}}><option value="statutDate">Date</option><option value="rendement">Rendement</option><option value="price">Prix</option></select>
      <span style={{fontSize:11,color:'var(--color-text-tertiary)',marginLeft:'auto'}}>{filtered.length} bien(s)</span>
    </div>
    {filtered.length===0&&<div style={{textAlign:'center',padding:'3rem 0',color:'var(--color-text-tertiary)',fontSize:13}}>Aucun bien suivi.</div>}
    <div style={{border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-md)',overflow:'hidden'}}>
      {filtered.length>0&&<div style={{display:'grid',gridTemplateColumns:'2fr .7fr .8fr .8fr .8fr 90px',gap:4,padding:'6px 10px',fontSize:10,color:'var(--color-text-tertiary)',borderBottom:'0.5px solid var(--color-border-tertiary)',background:'var(--color-background-secondary)'}}>{['Bien','CP','Prix','Rendement','Modifié','Statut'].map(h=><span key={h}>{h}</span>)}</div>}
      {filtered.map(b=>(<div key={b.id} onClick={()=>onOpenBien(b)} style={{display:'grid',gridTemplateColumns:'2fr .7fr .8fr .8fr .8fr 90px',gap:4,padding:'8px 10px',fontSize:12,borderBottom:'0.5px solid var(--color-border-tertiary)',alignItems:'center',cursor:'pointer',opacity:b.statut==='Écarté'?0.5:1}} onMouseEnter={e=>e.currentTarget.style.background='var(--color-background-secondary)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}}>{b.title}</div>
        <span style={{fontSize:11,color:'var(--color-text-secondary)'}}>{b.cp}</span>
        <span>{b.price?.toLocaleString('fr-FR')} €</span>
        <span style={{fontWeight:500,color:b.rendement>=8?'#27500A':b.rendement?'#633806':'var(--color-text-tertiary)'}}>{b.rendement?b.rendement+'%':'—'}</span>
        <span style={{fontSize:11,color:'var(--color-text-tertiary)'}}>{b.statutDate||'—'}</span>
        <Badge statut={b.statut}/>
      </div>))}
    </div>
  </div>);
}

function App() {
  const [biens, setBiens] = useStorage(STORAGE_BIENS);
  const [contacts, setContacts] = useStorage(STORAGE_CONTACTS);
  const [tabs, setTabs] = useState([{id:'search',type:'search',label:'Recherche'}]);
  const [activeTab, setActiveTab] = useState('search');
  const [navSection, setNavSection] = useState('search');

  const updateBien = useCallback((b)=>setBiens(p=>({...p,[b.id]:b})),[setBiens]);
  const updateContact = useCallback((c)=>setContacts(p=>({...p,[c.id]:c})),[setContacts]);
  const deleteContact = useCallback((id)=>{ setContacts(p=>{const n={...p};delete n[id];return n;}); setTabs(ts=>ts.filter(t=>t.id!=='contact_'+id)); setActiveTab('annuaire'); },[setContacts]);

  const openTab=(id,type,label,data)=>{setTabs(ts=>ts.find(t=>t.id===id)?ts:[...ts,{id,type,label,data}]);setActiveTab(id);};
  const openBien=(b)=>openTab('bien_'+b.id,'bien',b.title.slice(0,18)+'…',b);
  const openContact=(c)=>{setNavSection('annuaire');openTab('contact_'+c.id,'contact',c.nom.slice(0,16),c);};
  const closeTab=(id,e)=>{e.stopPropagation();const idx=tabs.findIndex(t=>t.id===id);setTabs(ts=>ts.filter(t=>t.id!==id));if(activeTab===id)setActiveTab(tabs[Math.max(0,idx-1)]?.id||'search');};
  const handleNav=(id)=>{setNavSection(id);if(id==='search'){setActiveTab('search');return;}openTab(id,id,id==='annuaire'?'Annuaire':id==='interactions'?'Interactions':'Biens suivis',null);};

  const currentTab=tabs.find(t=>t.id===activeTab);
  const renderContent=()=>{
    if(!currentTab)return null;
    if(currentTab.type==='search')return <SearchView onOpenBien={openBien} biens={biens} updateBien={updateBien} setBiens={setBiens} contacts={contacts}/>;
    if(currentTab.type==='suivis')return <BiensSuivisView biens={biens} contacts={contacts} onOpenBien={openBien}/>;
    if(currentTab.type==='annuaire')return <AnnuaireView contacts={contacts} setContacts={setContacts} biens={biens} onOpenContact={openContact}/>;
    if(currentTab.type==='bien'){const b=biens[currentTab.data?.id]||currentTab.data;return b?<BienDetail bien={b} onUpdate={updateBien} contacts={contacts} setContacts={setContacts} onOpenContact={openContact}/>:null;}
    if(currentTab.type==='contact'){const c=contacts[currentTab.data?.id]||currentTab.data;return c?<ContactDetail contact={c} onUpdate={updateContact} biens={biens} onOpenBien={openBien} onDelete={deleteContact}/>:null;}
    return null;
  };

  const navItems=[{id:'search',section:'biens',label:'Recherche'},{id:'suivis',section:'biens',label:'Biens suivis'},{id:'annuaire',section:'contacts',label:'Annuaire'}];

  return (
    <div style={{display:'flex',height:'100vh',fontFamily:'var(--font-sans)'}}>
      <div style={{width:164,background:'var(--color-background-secondary)',borderRight:'0.5px solid var(--color-border-tertiary)',display:'flex',flexDirection:'column',padding:'14px 0',flexShrink:0}}>
        <div style={{padding:'0 14px 14px',fontSize:14,fontWeight:500,borderBottom:'0.5px solid var(--color-border-tertiary)',marginBottom:8}}>ImmoInvest<span style={{fontSize:10,fontWeight:400,color:'var(--color-text-tertiary)',display:'block',marginTop:2}}>v24 · LeBonCoin</span></div>
        <div style={{fontSize:10,color:'var(--color-text-tertiary)',padding:'4px 14px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Biens</div>
        {navItems.filter(n=>n.section==='biens').map(item=>(<div key={item.id} onClick={()=>handleNav(item.id)} style={{padding:'7px 14px',fontSize:12,color:navSection===item.id?'var(--color-text-primary)':'var(--color-text-secondary)',background:navSection===item.id?'var(--color-background-primary)':'transparent',borderRight:navSection===item.id?'2px solid #378ADD':'none',cursor:'pointer',fontWeight:navSection===item.id?500:400}}>{item.label}</div>))}
        <div style={{fontSize:10,color:'var(--color-text-tertiary)',padding:'10px 14px 4px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Contacts</div>
        <div onClick={()=>handleNav('annuaire')} style={{padding:'7px 14px',fontSize:12,color:navSection==='annuaire'?'var(--color-text-primary)':'var(--color-text-secondary)',background:navSection==='annuaire'?'var(--color-background-primary)':'transparent',borderRight:navSection==='annuaire'?'2px solid #378ADD':'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>Annuaire<span style={{fontSize:10,background:'#E6F1FB',color:'#0C447C',borderRadius:10,padding:'1px 6px'}}>{Object.keys(contacts).length}</span></div>
        <div style={{marginTop:'auto',padding:'10px 14px',borderTop:'0.5px solid var(--color-border-tertiary)',fontSize:11,color:'var(--color-text-tertiary)'}}>{Object.keys(biens).length} biens · {Object.keys(contacts).length} contacts</div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{display:'flex',borderBottom:'0.5px solid var(--color-border-tertiary)',background:'var(--color-background-secondary)',overflowX:'auto',flexShrink:0}}>
          {tabs.map(t=>(<div key={t.id} onClick={()=>{setActiveTab(t.id);if(t.type==='search')setNavSection('search');if(['annuaire','suivis'].includes(t.type))setNavSection(t.type);}} style={{padding:'7px 12px',fontSize:12,color:activeTab===t.id?'var(--color-text-primary)':'var(--color-text-secondary)',background:activeTab===t.id?'var(--color-background-primary)':'transparent',borderRight:'0.5px solid var(--color-border-tertiary)',cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6,fontWeight:activeTab===t.id?500:400,flexShrink:0}}>{t.label}{t.id!=='search'&&<span onClick={e=>closeTab(t.id,e)} style={{fontSize:13,color:'var(--color-text-tertiary)',marginLeft:2}}>×</span>}</div>))}
        </div>
        <div style={{flex:1,overflowY:'auto',background:'var(--color-background-primary)'}}>{renderContent()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
